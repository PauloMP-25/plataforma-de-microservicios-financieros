<main class="min-h-screen bg-slate-50 p-4 text-slate-900 dark:bg-slate-900 dark:text-slate-100 md:p-6">
  <section class="mx-auto max-w-7xl space-y-4">
    <a routerLink="/ingresos" class="inline-flex items-center gap-2 text-sm text-slate-600 hover:text-slate-900 dark:text-slate-300 dark:hover:text-white">← Volver</a>

    <header>
      <h1 class="text-3xl font-bold">Nuevo ingreso</h1>
      <p class="text-sm text-slate-500 dark:text-slate-400">Registra un nuevo ingreso de forma rápida y inteligente.</p>
    </header>

    <section class="grid grid-cols-1 gap-5 xl:grid-cols-3 xl:items-start">
      <article class="relative overflow-hidden rounded-2xl border border-violet-200/70 bg-gradient-to-br from-white via-violet-50/40 to-cyan-50/30 p-4 shadow-[0_16px_38px_rgba(76,29,149,.16)] ring-1 ring-violet-100/70 transition-all duration-300 hover:-translate-y-0.5 hover:shadow-[0_24px_52px_rgba(76,29,149,.24)] dark:border-violet-500/30 dark:bg-gradient-to-br dark:from-slate-800 dark:via-slate-800 dark:to-slate-900 dark:ring-violet-500/20 xl:col-span-2">
        <div class="pointer-events-none absolute inset-x-0 top-0 h-1 bg-gradient-to-r from-violet-500 via-fuchsia-500 to-cyan-500"></div>
        <div class="mb-4 inline-flex items-center gap-2 rounded-full border border-violet-200 bg-violet-50 px-3 py-1 text-xs font-extrabold uppercase tracking-wide text-violet-700 dark:border-violet-500/40 dark:bg-violet-500/15 dark:text-violet-300">
          <i class="fa-solid fa-sparkles"></i>
          Registro guiado
        </div>
        <app-ingreso-form
          [categorias]="categorias"
          [metodos]="metodos"
          [model]="form"
          [sugerencias]="sugerencias"
          (modelChange)="form = $event; onDescripcionChange()"
          (seleccionarSugerencia)="seleccionarSugerencia($event)"
          (crearCategoriaManualmente)="crearCategoriaManualmente($event)"
          (guardar)="guardar()"
          (cancelar)="cancelar()">
        </app-ingreso-form>
      </article>

      <aside class="grid grid-cols-1 gap-4 xl:sticky xl:top-4">
        <app-ingreso-preview [data]="form"></app-ingreso-preview>
        <app-ingreso-recent-list class="block" [items]="recientes"></app-ingreso-recent-list>
      </aside>
    </section>
  </section>
</main>
