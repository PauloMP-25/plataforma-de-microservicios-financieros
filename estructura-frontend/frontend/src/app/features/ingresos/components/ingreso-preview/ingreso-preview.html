<article class="rounded-2xl border border-emerald-300/80 bg-gradient-to-br from-emerald-100 via-emerald-200/80 to-green-200/80 p-4 shadow-[0_16px_34px_rgba(5,150,105,.25)] dark:border-emerald-500/40 dark:bg-gradient-to-br dark:from-emerald-500/25 dark:via-emerald-500/20 dark:to-green-500/20">
  <h3 class="text-sm font-extrabold text-emerald-900 dark:text-emerald-200">Vista previa del ingreso</h3>
  <div class="mt-3 rounded-xl border border-emerald-300/60 bg-white/95 p-4 shadow-sm dark:border-emerald-500/40 dark:bg-slate-900/70">
    <p class="text-2xl font-extrabold text-emerald-700 dark:text-emerald-300">S/ {{ data.monto || 0 | number:'1.2-2' }}</p>
    <p class="mt-1 text-sm font-medium text-slate-800 dark:text-slate-100">{{ data.categoriaNombre || data.categoria || 'Categoría' }}</p>
    <p class="text-xs text-slate-500 dark:text-slate-400">{{ data.fechaTransaccion || '--/--/----' }} • {{ data.metodoPago || 'Método' }}</p>
  </div>
</article>
