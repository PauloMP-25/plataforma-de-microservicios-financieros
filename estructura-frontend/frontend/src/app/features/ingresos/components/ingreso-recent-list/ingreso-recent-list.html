<article class="h-full min-h-[420px] rounded-3xl border border-slate-200 bg-white p-5 shadow-sm dark:border-slate-700 dark:bg-slate-800 md:p-6">
  <header class="mb-4 flex items-center justify-between">
    <h3 class="text-xl font-extrabold text-slate-900 dark:text-slate-100">Ingresos recientes</h3>
  </header>
  <ul class="space-y-4">
    <li *ngFor="let item of items" class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <span class="inline-flex h-11 w-11 items-center justify-center rounded-xl" [ngClass]="iconBgClass(item.categoria)">
          <i [class]="iconClass(item.categoria)"></i>
        </span>
        <div>
          <p class="text-sm font-medium text-slate-800 dark:text-slate-100">{{ item.categoria }}</p>
          <p class="text-xs text-slate-500 dark:text-slate-400">{{ item.descripcion }}</p>
        </div>
      </div>
      <div class="text-right">
        <p class="text-sm font-semibold text-slate-800 dark:text-slate-100">S/ {{ item.monto | number:'1.2-2' }}</p>
        <p class="text-xs text-slate-500 dark:text-slate-400">{{ item.fecha }}</p>
      </div>
    </li>
  </ul>
</article>
