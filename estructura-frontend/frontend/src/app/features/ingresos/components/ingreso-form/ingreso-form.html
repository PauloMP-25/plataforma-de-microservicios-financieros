<form class="space-y-4" (ngSubmit)="guardar.emit()">
  <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
    <label class="block">
      <span class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-200">Monto *</span>
      <input [(ngModel)]="model.monto" name="monto" type="number" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-900" (ngModelChange)="onModelChange()" />
    </label>
    <label class="block">
      <span class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-200">Fecha de transacción *</span>
      <input [(ngModel)]="model.fechaTransaccion" name="fechaTransaccion" type="text" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-900" (ngModelChange)="onModelChange()" />
    </label>
  </div>

  <label class="block">
    <span class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-200">Descripción / Nota *</span>
    <textarea [(ngModel)]="model.descripcion" name="descripcion" rows="3" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-900" (ngModelChange)="onModelChange()"></textarea>
  </label>

  <div class="flex justify-end mt-2">
    <button
      type="button"
      class="inline-flex items-center gap-1.5 rounded-lg border border-violet-300 bg-violet-50 px-3 py-1.5 text-xs font-bold text-violet-700 shadow-sm transition-all duration-150 hover:-translate-y-0.5 hover:bg-violet-100 hover:text-violet-800 dark:border-violet-500/40 dark:bg-violet-500/15 dark:text-violet-300 dark:hover:bg-violet-500/25 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0"
      [disabled]="(model.descripcion?.trim()?.length || 0) < 4 || clasificandoIa"
      (click)="clasificarIa.emit()">
      <i class="fa-solid fa-wand-magic-sparkles"></i>
      {{ clasificandoIa ? 'Analizando...' : '✨ Sugerir categoría con IA' }}
    </button>
  </div>



  <article *ngIf="sugerencias.length > 0" class="rounded-xl border border-violet-200 bg-violet-50 p-3 dark:border-violet-500/30 dark:bg-violet-500/10">
    <p class="text-xs font-bold text-violet-700 dark:text-violet-300 mb-2">✨ Categorías sugeridas por IA (haz clic para auto-seleccionar o crear):</p>
    <div class="flex flex-wrap gap-2">
      <button 
        *ngFor="let sug of sugerencias"
        type="button" 
        class="inline-flex items-center gap-1.5 rounded-lg border border-indigo-200 bg-white px-3 py-1.5 text-xs font-extrabold text-slate-700 shadow-sm transition-all duration-150 hover:-translate-y-0.5 hover:bg-indigo-50 hover:text-indigo-600 dark:border-slate-600 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-indigo-950/40"
        (click)="seleccionarSugerencia.emit(sug)">
        <i class="fa-solid fa-sparkles text-indigo-500"></i>
        {{ sug }}
      </button>
    </div>
  </article>

  <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
    <div class="block">
      <label class="block">
        <span class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-200">Categoría *</span>
        <select [(ngModel)]="model.categoria" name="categoria" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-900" (ngModelChange)="onModelChange()">
          <option *ngFor="let c of categoriasConCrear" [value]="c.value">{{ c.label }}</option>
        </select>
      </label>
      
      <!-- Creación manual en línea -->
      <div *ngIf="model.categoria === 'CREAR_NUEVA'" class="mt-2 space-y-1.5 p-2.5 rounded-xl border border-dashed border-violet-300 bg-violet-50/30 dark:border-violet-500/30">
        <span class="text-xs font-bold text-violet-700 dark:text-violet-300">Nombre de la nueva categoría</span>
        <div class="flex gap-2">
          <input 
            [(ngModel)]="nuevaCategoriaNombre" 
            name="nuevaCategoriaNombre" 
            type="text" 
            placeholder="Ej: Bonos, Regalos..." 
            class="w-full rounded-lg border border-slate-300 bg-white px-2 py-1 text-xs dark:border-slate-600 dark:bg-slate-900"
          />
          <button 
            type="button" 
            class="rounded-lg bg-violet-600 px-3 py-1 text-xs font-bold text-white shadow-sm hover:bg-violet-500"
            (click)="confirmarCrearCategoria()">
            Crear
          </button>
        </div>
      </div>
    </div>
    
    <label class="block">
      <span class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-200">Método de pago *</span>
      <select [(ngModel)]="model.metodoPago" name="metodoPago" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-900" (ngModelChange)="onModelChange()">
        <option *ngFor="let m of metodos" [value]="m.value">{{ m.label }}</option>
      </select>
    </label>
  </div>

  <div class="space-y-2">
    <span class="block text-sm font-medium text-slate-700 dark:text-slate-200">Etiquetas</span>
    <div class="flex flex-wrap gap-2">
      <span *ngFor="let tag of model.etiquetas" class="inline-flex items-center gap-1 rounded-lg border border-violet-300 bg-violet-100 px-2 py-1 text-xs font-medium text-violet-700 dark:border-violet-500/40 dark:bg-violet-500/20 dark:text-violet-200">
        {{ tag }}
        <button type="button" class="text-[10px] opacity-80 hover:opacity-100" (click)="eliminarEtiqueta(tag)">✕</button>
      </span>
    </div>

    <div class="grid grid-cols-1 gap-2 md:grid-cols-[1fr_auto]">
      <input
        [(ngModel)]="nuevaEtiqueta"
        name="nuevaEtiqueta"
        type="text"
        maxlength="20"
        placeholder="Ejemplos: Trabajo, Mensual, Extra, Proyecto"
        class="rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm dark:border-slate-600 dark:bg-slate-900"
      />
      <button type="button" class="rounded-xl border border-violet-300 px-3 py-2 text-sm font-medium text-violet-700 dark:border-violet-500/50 dark:text-violet-300" (click)="agregarEtiqueta()">
        Agregar etiqueta
      </button>
    </div>
    <p class="text-xs text-slate-500 dark:text-slate-400">Solo una palabra por etiqueta.</p>
  </div>

  <div class="flex justify-end gap-3 pt-2">
    <button type="button" class="rounded-xl border border-slate-300 px-4 py-2 text-sm dark:border-slate-600" (click)="cancelar.emit()">Cancelar</button>
    <button type="submit" class="rounded-xl bg-emerald-600 px-5 py-2.5 text-sm font-extrabold text-white shadow-[0_10px_24px_rgba(5,150,105,.30)] transition-all duration-200 hover:-translate-y-0.5 hover:bg-emerald-500">Guardar ingreso</button>
  </div>
</form>
