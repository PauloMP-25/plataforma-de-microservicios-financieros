<section class="grid grid-cols-1 gap-3 sm:grid-cols-2 xl:grid-cols-4">
  <article
    *ngFor="let item of items"
    class="group relative overflow-hidden rounded-2xl border border-slate-200 bg-white p-4 shadow-sm transition-all duration-300 hover:-translate-y-1 hover:shadow-[0_14px_30px_rgba(2,6,23,.12)] dark:border-slate-700 dark:bg-slate-800 md:rounded-3xl md:p-5"
    [ngClass]="cardClass(item.color, item.titulo)">

    <div *ngIf="isRacha(item.titulo)" class="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_20%_30%,rgba(251,113,40,.22),transparent_45%)]"></div>

    <div class="relative z-10 flex items-start gap-3">
      <span
        class="inline-flex h-9 w-9 items-center justify-center rounded-xl text-base md:h-11 md:w-11 md:rounded-2xl md:text-lg"
        [ngClass]="isRacha(item.titulo) ? 'bg-orange-500/20 text-orange-400 shadow-[0_0_22px_rgba(251,113,40,.35)]' : 'bg-slate-100 dark:bg-slate-700'">
        <i [class]="iconClass(item.titulo)" [ngClass]="isRacha(item.titulo) ? '' : iconColorClass(item.color)"></i>
      </span>

      <div class="min-w-0">
        <p class="text-xs md:text-sm" [ngClass]="isRacha(item.titulo) ? 'font-extrabold uppercase tracking-wider text-orange-400' : 'font-medium text-slate-500 dark:text-slate-400'">{{ item.titulo }}</p>
        <p class="mt-0.5 text-3xl font-extrabold leading-none md:text-4xl" [ngClass]="isRacha(item.titulo) ? 'text-slate-100' : 'text-slate-900 dark:text-slate-100'">{{ item.valor }}</p>
        <span
          class="mt-2 inline-flex rounded-xl px-2 py-0.5 text-[11px] font-semibold md:mt-3 md:px-2.5 md:py-1 md:text-xs"
          [ngClass]="isRacha(item.titulo) ? 'bg-orange-500/15 text-orange-300 border border-orange-400/30' : colorClass(item.color)">
          {{ item.subtitulo }}
        </span>
      </div>
    </div>

    <div *ngIf="!isRacha(item.titulo)" class="absolute bottom-0 left-0 h-1 w-0 rounded-full bg-violet-500 transition-all duration-300 group-hover:w-24"></div>
  </article>
</section>
