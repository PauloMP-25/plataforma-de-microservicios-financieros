<section class="auth" id="pagina-auth">
  <!-- Fondo global animado -->
  <div class="auth__fondo">
    <div class="auth__orbe auth__orbe--1"></div>
    <div class="auth__orbe auth__orbe--2"></div>
    <div class="auth__rejilla"></div>
  </div>

  <a routerLink="/inicio" class="auth__volver" id="btn-volver-inicio">
    <i class="fas fa-arrow-left"></i> Volver al inicio
  </a>

  <!-- Contenedor Maestro -->
  <div class="auth__contenedor-maestro" [class.mostrar-registro]="vistaActual === 'registro'">
    
    <!-- Panel de Formularios (Deslizante) -->
    <div class="auth__formulario-contenedor">
      <div class="auth__formulario-interior" [class.activo]="vistaActual === 'login'">
        <app-iniciar-sesion></app-iniciar-sesion>
      </div>
      <div class="auth__formulario-interior" [class.activo]="vistaActual === 'registro'">
        <app-crear-cuenta></app-crear-cuenta>
      </div>
    </div>

    <!-- Panel Lateral Informativo (Deslizante) -->
    <div class="auth__lateral-contenedor">
      <div class="auth__lateral-interior" [class.activo]="vistaActual === 'login'">
        <h2>¿Listo para el control?</h2>
        <p>Únete a miles de usuarios que ya dominan sus finanzas con IA. Tu libertad financiera comienza aquí.</p>
        <button class="auth__btn-lateral" (click)="cambiarVista('registro')" id="btn-ir-registro">
          Crear Cuenta
        </button>
      </div>
      
      <div class="auth__lateral-interior" [class.activo]="vistaActual === 'registro'">
        <h2>¡Hola de nuevo!</h2>
        <p>Tus finanzas te esperan. Retoma el control de tu dinero y alcanza tus metas financieras.</p>
        <button class="auth__btn-lateral" (click)="cambiarVista('login')" id="btn-ir-login">
          Iniciar Sesión
        </button>
      </div>
    </div>

  </div>
</section>
