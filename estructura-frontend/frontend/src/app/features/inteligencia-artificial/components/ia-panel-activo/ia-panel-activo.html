<div class="panel-activo-wrap" *ngIf="modulo">
  <!-- Cabecera del panel -->
  <div class="panel-header">
    <div class="icon-frame" [style.color]="modulo.tagColor" [style.border-color]="modulo.tagColor + '33'">
      <i [className]="modulo.icon"></i>
    </div>
    <div class="header-details">
      <span class="category-badge" [style.background]="modulo.tagColor + '15'" [style.color]="modulo.tagColor">
        {{ modulo.tag }}
      </span>
      <h2 class="modulo-title">{{ modulo.label }}</h2>
      <p class="modulo-desc">{{ modulo.descripcion }}</p>
    </div>
  </div>

  <!-- Endpoint del microservicio -->
  <div class="endpoint-badge">
    <i class="fa-solid fa-plug-circle-bolt"></i>
    <code>POST {{ modulo.endpoint }}</code>
  </div>

  <!-- Formulario dinámico de parámetros -->
  <div class="form-section">
    <h3 class="section-title"><i class="fa-solid fa-sliders"></i> Parámetros de Entrada</h3>

    <!-- 1. Caso: Simulación de metas -->
    <div class="inputs-grid" *ngIf="modulo.id === 'simular-meta'">
      <div class="input-group">
        <label>Nombre de la Meta</label>
        <input type="text" [(ngModel)]="nombreMeta" class="app-input" placeholder="Ej. Ahorro para auto" />
      </div>

      <div class="input-group">
        <label>Monto Objetivo ($ / S/.)</label>
        <input type="number" [(ngModel)]="montoObjetivo" class="app-input" />
      </div>

      <div class="input-group">
        <label>Ahorro Actual</label>
        <input type="number" [(ngModel)]="montoActualAhorrado" class="app-input" />
      </div>

      <div class="input-group">
        <label>Aporte Mensual Deseado</label>
        <input type="number" [(ngModel)]="aporteMensualDeseado" class="app-input" />
      </div>
    </div>

    <!-- 2. Caso: Clasificación de transacciones -->
    <div class="inputs-grid" *ngIf="modulo.id === 'clasificar-transaccion'">
      <div class="input-group">
        <label>ID Temporal de la Transacción</label>
        <input type="text" [(ngModel)]="idTemporal" class="app-input" />
      </div>

      <div class="input-group">
        <label>Tipo de Movimiento</label>
        <select [(ngModel)]="tipoMovimiento" class="app-input select">
          <option value="GASTO">GASTO</option>
          <option value="INGRESO">INGRESO</option>
        </select>
      </div>

      <div class="input-group full-width">
        <label>Etiquetas / Palabras Clave</label>
        <input type="text" [(ngModel)]="etiquetas" class="app-input" placeholder="Separadas por comas" />
      </div>

      <div class="input-group full-width">
        <label>Notas adicionales</label>
        <textarea [(ngModel)]="notas" class="app-input textarea" rows="2" placeholder="Detalles de la compra..."></textarea>
      </div>
    </div>

    <!-- 3. Caso general: Filtros por fecha y tamaño de lote -->
    <div class="inputs-grid" *ngIf="modulo.id !== 'simular-meta' && modulo.id !== 'clasificar-transaccion'">
      <div class="input-group">
        <label>Mes de consulta</label>
        <select [(ngModel)]="mesSelect" class="app-input select">
          <option [value]="1">Enero</option>
          <option [value]="2">Febrero</option>
          <option [value]="3">Marzo</option>
          <option [value]="4">Abril</option>
          <option [value]="5">Mayo</option>
          <option [value]="6">Junio</option>
          <option [value]="7">Julio</option>
          <option [value]="8">Agosto</option>
          <option [value]="9">Septiembre</option>
          <option [value]="10">Octubre</option>
          <option [value]="11">Noviembre</option>
          <option [value]="12">Diciembre</option>
        </select>
      </div>

      <div class="input-group">
        <label>Año</label>
        <select [(ngModel)]="anioSelect" class="app-input select">
          <option [value]="2024">2024</option>
          <option [value]="2025">2025</option>
          <option [value]="2026">2026</option>
          <option [value]="2027">2027</option>
        </select>
      </div>

      <div class="input-group" *ngIf="modulo.filtroFecha">
        <label>Frecuencia de análisis</label>
        <select [(ngModel)]="frecuenciaSelect" class="app-input select">
          <option value="SEMANAL">Semanal</option>
          <option value="QUINCENAL">Quincenal</option>
          <option value="MENSUAL">Mensual</option>
        </select>
      </div>

      <div class="input-group">
        <label>Lote de transacciones (Máx)</label>
        <input type="number" [(ngModel)]="tamanioPagina" class="app-input" min="10" max="1000" />
      </div>
    </div>
  </div>

  <!-- Flujo de ejecución descriptivo -->
  <div class="execution-pipeline">
    <p class="pipeline-title"><i class="fa-solid fa-diagram-project"></i> Flujo de Ejecución e Integración</p>
    <div class="pipeline-steps">
      <div class="step"><span class="bullet">1</span> API Gateway (Verificación JWT)</div>
      <div class="step"><span class="bullet">2</span> Redis (Control de cuota semanal)</div>
      <div class="step"><span class="bullet">3</span> ms-ia (Gemini 1.5 Pro + Pandas)</div>
      <div class="step"><span class="bullet">4</span> Auditar (RabbitMQ audit event)</div>
    </div>
  </div>

  <!-- Botón Ejecutar -->
  <button class="btn-execute" (click)="onEjecutar()" [disabled]="cargando" [style.background]="modulo.tagColor">
    <span class="btn-content" *ngIf="!cargando">
      <i class="fa-solid fa-bolt"></i> Ejecutar Análisis Inteligente
    </span>
    <span class="btn-content font-bold animate-pulse" *ngIf="cargando">
      <i class="fa-solid fa-circle-notch fa-spin"></i> Procesando...
    </span>
  </button>
</div>
