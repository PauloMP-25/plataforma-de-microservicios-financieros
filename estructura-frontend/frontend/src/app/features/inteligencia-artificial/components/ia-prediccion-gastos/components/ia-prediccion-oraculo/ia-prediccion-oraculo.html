<div class="mystic-scene">
  <!-- Pedestal de la bola -->
  <div class="pedestal-top"></div>
  <div class="pedestal-base"></div>

  <!-- La Bola de Cristal (Contenedor Principal) -->
  <div class="crystal-ball" [class.magic-pulse]="oraculoHablando">
    <!-- Brillo/Glow Interno -->
    <div class="ball-glow"></div>
    <div class="ball-highlight"></div>
    <div class="ball-mist"></div>

    <!-- Gráfico SVG Wave dentro de la Esfera -->
    <div class="chart-wrapper">
      <svg viewBox="0 0 240 140" class="oraculo-svg">
        <defs>
          <linearGradient id="histGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="rgba(34, 211, 238, 0.25)" />
            <stop offset="100%" stop-color="rgba(34, 211, 238, 0)" />
          </linearGradient>
          <linearGradient id="predLineGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#22d3ee" />
            <stop offset="100%" stop-color="#a855f7" />
          </linearGradient>
          <filter id="glowing" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
              <feMergeNode in="blur" />
              <feMergeNode in="SourceGraphic" />
            </feMerge>
          </filter>
        </defs>

        <path [attr.d]="svgAreaHistorial()" fill="url(#histGrad)" />
        <path [attr.d]="svgPathHistorial()" fill="none" stroke="#22d3ee" stroke-width="2.5" opacity="0.65" />
        <path [attr.d]="svgPathProyeccion()" fill="none" stroke="url(#predLineGrad)" stroke-width="3" stroke-dasharray="5 4" filter="url(#glowing)" />

        <ng-container *ngIf="chartPoints() as pts">
          <circle *ngIf="pts.puntos && pts.puntos.length > 0"
                  [attr.cx]="pts.puntos[pts.puntos.length - 1].x" 
                  [attr.cy]="pts.puntos[pts.puntos.length - 1].y" 
                  r="4" 
                  fill="#22d3ee" />
          <circle [attr.cx]="pts.puntoProj.x" 
                  [attr.cy]="pts.puntoProj.y" 
                  r="6" 
                  fill="#a855f7" 
                  filter="url(#glowing)" />
        </ng-container>
      </svg>

      <!-- Leyenda flotante dentro de la bola -->
      <div class="ball-legend">
        <span class="legend-hist">Historial</span>
        <span class="legend-spacer">→</span>
        <span class="legend-pred">Predicción</span>
      </div>
    </div>
  </div>
</div>
