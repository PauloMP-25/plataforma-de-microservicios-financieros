<div class="id-card-side card-front" [ngStyle]="{ '--cluster-color': currentCluster.color }">
  <div class="card-glow-border"></div>
  <div class="card-badge-top">LUKA IDENTITY CARD</div>
  
  <div class="id-card-layout">
    <!-- Avatar del Usuario Temático -->
    <div class="id-avatar-container">
      <div class="id-avatar-glow" [style.background]="currentCluster.color"></div>
      <svg class="id-avatar-svg" viewBox="0 0 40 40">
        <circle cx="20" cy="20" r="18" fill="#1e293b" stroke="#334155" stroke-width="1.5" />
        <!-- Cabeza -->
        <circle cx="20" cy="15" r="7" fill="#fbcfe8" />
        <!-- Cabello -->
        <path d="M12 15 C12 8, 28 8, 28 15" fill="#1e293b" />
        <!-- Cuerpo -->
        <path d="M10 32 C10 24, 30 24, 30 32" [attr.fill]="currentCluster.color" />
        <!-- Gafas cool de IA -->
        <rect x="15" y="13" width="10" height="3" rx="1.5" fill="#f43f5e" opacity="0.9" />
      </svg>
    </div>
    
    <div class="id-details">
      <span class="id-cluster-sub">Personalidad Financiera Dominante</span>
      <h3 class="id-cluster-name">{{ currentCluster.nombre }}</h3>
      
      <div class="id-badges-row">
        <span *ngFor="let rasgo of currentCluster.rasgos" class="rasgo-badge">
          {{ rasgo }}
        </span>
      </div>
    </div>
  </div>
</div>
