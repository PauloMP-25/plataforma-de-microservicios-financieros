<div class="radar-panel card-premium">
  <div class="panel-header">
    <h3 class="panel-title">
      <i class="fa-solid fa-compass-drafting text-purple-400"></i>
      Patrón Multidimensional
    </h3>
    
    <!-- Toggle Semana vs Semana -->
    <button class="btn-toggle-semana" (click)="toggleSemana()">
      <i class="fa-solid fa-clock-rotate-left"></i>
      <span>{{ semanaSeleccionada() === 'ESTA_SEMANA' ? 'Esta Semana' : 'Semana Pasada' }}</span>
    </button>
  </div>

  <div class="radar-canvas-container">
    <svg viewBox="0 0 300 300" class="radar-svg" width="100%" height="100%">
      <defs>
        <!-- Gradiente para el Radar Actual -->
        <radialGradient id="radarGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(168, 85, 247, 0.1)" />
          <stop offset="100%" stop-color="rgba(168, 85, 247, 0.4)" />
        </radialGradient>
        
        <!-- Glow Filter -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="3" result="blur" />
          <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
      </defs>

      <!-- Dibujar la red hexagonal (polígonos concéntricos) -->
      <polygon *ngFor="let pol of redHexagonal().poligonos" [attr.points]="pol" class="radar-grid-line" />
      
      <!-- Dibujar los ejes desde el centro a cada vértice -->
      <line *ngFor="let eje of redHexagonal().ejes" 
            [attr.x1]="eje.x1" [attr.y1]="eje.y1" 
            [attr.x2]="eje.x2" [attr.y2]="eje.y2" 
            class="radar-axis-line" />

      <!-- Círculos de referencia en los niveles de red (20, 40, 60, 80, 100) -->
      <circle [attr.cx]="cx" [attr.cy]="cy" r="20" class="radar-ref-circle" />
      <circle [attr.cx]="cx" [attr.cy]="cy" r="40" class="radar-ref-circle" />
      <circle [attr.cx]="cx" [attr.cy]="cy" r="60" class="radar-ref-circle" />
      <circle [attr.cx]="cx" [attr.cy]="cy" r="80" class="radar-ref-circle" />
      <circle [attr.cx]="cx" [attr.cy]="cy" r="100" class="radar-ref-circle" />

      <!-- Radar Ideal LUKA (línea punteada celeste/cyan) -->
      <polygon [attr.points]="puntosRadar().ideal" class="radar-ideal-polygon" />

      <!-- Radar Actual del Usuario -->
      <polygon [attr.points]="puntosRadar().actual" class="radar-actual-polygon" filter="url(#glow)" />

      <!-- Vértices del Radar Actual (Círculos Interactivos) -->
      <g *ngFor="let p of puntosRadar().verticesActual" class="radar-vertex-group" (click)="seleccionarDimension(p.label)">
        <circle [attr.cx]="p.x" [attr.cy]="p.y" r="5.5" class="radar-vertex-outer" />
        <circle [attr.cx]="p.x" [attr.cy]="p.y" r="3.5" class="radar-vertex-inner" />
      </g>

      <!-- Textos de Dimensiones en los Vértices del Radar Ideal -->
      <g *ngFor="let p of puntosRadar().verticesIdeal; let i = index">
        <text 
          [attr.x]="p.x + (p.x === cx ? 0 : (p.x > cx ? 12 : -12))"
          [attr.y]="p.y + (p.y === cy ? 0 : (p.y > cy ? 12 : -10))"
          [attr.text-anchor]="p.x === cx ? 'middle' : (p.x > cx ? 'start' : 'end')"
          class="radar-label"
          [class.radar-label--active]="dimensionSeleccionada() === p.label"
          (click)="seleccionarDimension(p.label)"
        >
          {{ dimensionesConfig[p.label].label }}
        </text>
      </g>
    </svg>
  </div>

  <div class="radar-legend">
    <div class="legend-item">
      <span class="legend-color legend-color--ideal"></span>
      <span class="legend-text">Ideal LUKA</span>
    </div>
    <div class="legend-item">
      <span class="legend-color legend-color--actual"></span>
      <span class="legend-text">Tu Perfil actual</span>
    </div>
  </div>

  <!-- Detalle emergente de dimensión del Radar -->
  <div class="dimension-detail-card" *ngIf="getDetalleDimension() as detail">
    <div class="detail-header">
      <span class="detail-title">
        <i class="fa-solid" [class.fa-piggy-bank]="detail.etiqueta === 'Ahorro'" [class.fa-calendar-check]="detail.etiqueta === 'Constancia'" [class.fa-sliders]="detail.etiqueta === 'Control'" [class.fa-circle-nodes]="detail.etiqueta === 'Diversidad'" [class.fa-clock]="detail.etiqueta === 'Puntualidad'" [class.fa-scale-balanced]="detail.etiqueta === 'Equilibrio'"></i>
        {{ detail.etiqueta }}
      </span>
      <span class="detail-badge" [class.detail-badge--low]="detail.valor < 60">{{ detail.valor }}%</span>
    </div>
    <p class="detail-desc">{{ detail.consejo }}</p>
  </div>
</div>
