<div class="coach-advice-panel card-premium" *ngIf="consejo">
  <div class="coach-avatar-container">
    <div class="neural-avatar nutritionist-avatar">
      <i class="fa-solid fa-apple-whole"></i>
      <div class="avatar-glow"></div>
    </div>
    <div class="coach-title-info">
      <h4 class="coach-name">Nutricionista LUKA</h4>
      <span class="coach-specialty">Salud Financiera</span>
    </div>
  </div>
  
  <div class="coach-message-box">
    <div class="coach-message">
      <div *ngIf="consejo.pensamiento_interno_ia" style="display: none;">
        <!-- El pensamiento interno se usa en logs o debug, opcionalmente mostrarlo -->
        <small class="text-slate-400">[{{ consejo.pensamiento_interno_ia }}]</small>
      </div>

      <div class="analysis-text">
        <p><strong>{{ consejo.introduccion }}</strong></p>
        <p>{{ consejo.analisis_patron }}</p>
      </div>
    </div>
    
    <div class="habit-highlight mt-3">
      <div class="habit-icon"><i class="fa-solid fa-bolt text-amber-400"></i></div>
      <div class="habit-content">
        <strong>Hábito Sugerido:</strong><br>
        {{ consejo.habito_atomico_sugerido }}
      </div>
    </div>

    <div class="coach-message mt-3">
      <p class="text-emerald-400 italic">{{ consejo.mensaje_motivacional }}</p>
    </div>
  </div>
</div>
