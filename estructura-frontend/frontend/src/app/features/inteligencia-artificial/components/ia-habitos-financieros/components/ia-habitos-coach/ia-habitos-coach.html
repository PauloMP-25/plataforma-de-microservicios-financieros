<div class="coach-advice-panel card-premium" *ngIf="consejoVisible()">
  <div class="coach-avatar-container">
    <div class="neural-avatar nutritionist-avatar">
      <i class="fa-solid fa-apple-whole"></i>
      <div class="avatar-glow"></div>
    </div>
    <div class="coach-title-info">
      <h4 class="coach-name">Nutricionista LUKA</h4>
      <span class="coach-specialty">Salud Financiera</span>
    </div>
  </div>
  
  <div class="coach-message-box">
    <!-- El texto con formato de máquina de escribir y Markdown de Luka -->
    <p class="coach-message" [innerHTML]="consejoHtml()"></p>
    
    <!-- Carga de respuesta parpadeante -->
    <div class="typewriter-cursor" *ngIf="isWriting()"></div>
  </div>
</div>
