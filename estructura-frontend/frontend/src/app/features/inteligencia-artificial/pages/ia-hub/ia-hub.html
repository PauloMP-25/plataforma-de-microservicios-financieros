<div class="hub-container">
  
  <!-- Cabecera principal de la sección -->
  <div class="hub-header">
    <div class="header-left">
      <div class="title-with-icon">
        <div class="neural-orb">
          <i class="fa-solid fa-microchip animate-spin-slow"></i>
        </div>
        <h1 class="page-title">Centro de Inteligencia Artificial</h1>
      </div>
      <p class="page-subtitle">Explora análisis avanzados, proyecciones y optimizaciones para tu capital impulsados por Google Gemini Pro.</p>
      <div class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-primary/10 text-primary border border-primary/20 animate-pulse mt-2">
        <span class="w-1.5 h-1.5 rounded-full bg-primary"></span>
        Tailwind CSS v3 Activo
      </div>
    </div>
    
    <div class="header-right" *ngIf="!moduloSeleccionado()">
      <div class="quota-badge">
        <i class="fa-solid fa-bolt"></i>
        <span>Cuota: Activa &amp; Sin Límite (Luka Elite)</span>
      </div>
    </div>
  </div>

  <!-- Vista 1: Cuadrícula de Todos los Módulos -->
  <div class="vista-grid-modulos" *ngIf="!moduloSeleccionado()">
    
    <!-- Filtros de categoría premium de IA -->
    <div class="hub-tabs">
      <button
        *ngFor="let tab of tabs"
        class="hub-tab"
        [class.hub-tab--active]="tabActiva() === tab"
        (click)="cambiarTab(tab)"
      >
        <i [className]="tabIcons[tab]"></i>
        <span>{{ tab }}</span>
        <span class="hub-tab-count">{{ conteoPor(tab) }}</span>
      </button>
    </div>

    <div class="grid-layout">
      <div class="grid-item" *ngFor="let mod of modulosFiltrados()">
        <app-ia-modulo-card
          [modulo]="mod"
          (seleccionar)="seleccionarModulo(mod)">
        </app-ia-modulo-card>
      </div>
    </div>
  </div>

  <!-- Vista 2: Consola de Trabajo (Módulo Activo) -->
  <div class="vista-consola" *ngIf="moduloSeleccionado() as mod">
    
    <!-- Barra de navegación / retroceso -->
    <div class="console-nav">
      <button class="btn-back" (click)="deseleccionarModulo()">
        <i class="fa-solid fa-arrow-left"></i> Volver al panel general
      </button>
      <span class="location-trail">
        Inteligencia Artificial <i class="fa-solid fa-chevron-right"></i> {{ mod.label }}
      </span>
    </div>

    <!-- Banner de Error si falla -->
    <div class="error-banner" *ngIf="errorMsg()">
      <div class="error-icon">
        <i class="fa-solid fa-triangle-exclamation"></i>
      </div>
      <div class="error-content">
        <h4>Error de Conexión</h4>
        <p>{{ errorMsg() }}</p>
      </div>
    </div>

    <!-- Layout Dividido (Panel Activo a la izquierda, Resultados a la derecha) -->
    <div class="console-grid">
      <div class="console-column left">
        <app-ia-panel-activo
          [modulo]="mod"
          [cargando]="cargando()"
          (ejecutar)="ejecutarAnalisis($event)">
        </app-ia-panel-activo>
      </div>

      <div class="console-column right">
        <!-- Módulo Gasto Hormiga: Vista temática del Detective -->
        <app-ia-gasto-hormiga
          *ngIf="moduloSeleccionado()?.id === 'gasto-hormiga'"
          [resultado]="resultado()"
          [cargando]="cargando()">
        </app-ia-gasto-hormiga>

        <!-- Módulo Predicción de Gastos: El Oráculo -->
        <app-ia-prediccion-gastos
          *ngIf="moduloSeleccionado()?.id === 'predecir-gastos'"
          [resultado]="resultado()"
          [cargando]="cargando()">
        </app-ia-prediccion-gastos>

        <!-- Módulo Hábitos Financieros: El Espejo del Alma -->
        <app-ia-habitos-financieros
          *ngIf="moduloSeleccionado()?.id === 'habitos-financieros'"
          [resultado]="resultado()"
          [cargando]="cargando()">
        </app-ia-habitos-financieros>

        <!-- Módulo Reto de Ahorro: La Misión Financiera -->
        <app-ia-reto-ahorro
          *ngIf="moduloSeleccionado()?.id === 'reto-ahorro'"
          [resultado]="resultado()"
          [cargando]="cargando()">
        </app-ia-reto-ahorro>

        <!-- Módulo Simulación de Meta: La Máquina del Tiempo -->
        <app-ia-simular-meta
          *ngIf="moduloSeleccionado()?.id === 'simular-meta'"
          [resultado]="resultado()"
          [cargando]="cargando()">
        </app-ia-simular-meta>

        <!-- Otros módulos: Vista genérica de resultados -->
        <app-ia-resultado
          *ngIf="moduloSeleccionado()?.id !== 'gasto-hormiga' && moduloSeleccionado()?.id !== 'predecir-gastos' && moduloSeleccionado()?.id !== 'habitos-financieros' && moduloSeleccionado()?.id !== 'reto-ahorro' && moduloSeleccionado()?.id !== 'simular-meta'"
          [resultado]="resultado()"
          [cargando]="cargando()">
        </app-ia-resultado>
      </div>
    </div>

  </div>

</div>
