<article class="group relative overflow-hidden rounded-xl border border-border bg-card p-5 shadow-sm transition-all duration-300 hover:-translate-y-1 hover:shadow-md">
  <div class="absolute -right-6 -top-6 h-24 w-24 rounded-full opacity-20 blur-2xl" [ngClass]="tonoClases"></div>

  <div class="mb-4 flex items-center justify-between gap-3">
    <div class="rounded-xl border p-3" [ngClass]="tonoClases">
      <i [class]="kpi.icono"></i>
    </div>
    <span class="font-heading text-xs font-bold uppercase tracking-[0.22em] text-text-muted">Admin</span>
  </div>

  <p class="text-xs font-bold uppercase tracking-[0.18em] text-text-muted">{{ kpi.etiqueta }}</p>
  <h3 class="mt-2 font-heading text-3xl font-extrabold text-text-primary">{{ kpi.valor }}</h3>
  <div class="mt-3 flex flex-wrap items-center gap-2 text-sm">
    <span class="font-bold" [ngClass]="tendenciaClases">{{ kpi.tendencia }}</span>
    <span class="text-text-secondary">{{ kpi.detalle }}</span>
  </div>
</article>
