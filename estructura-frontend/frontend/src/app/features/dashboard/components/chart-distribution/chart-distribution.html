<div class="chart-container" style="position: relative; height: 100%; width: 100%; display: flex; flex-direction: column; justify-content: space-between; box-sizing: border-box; min-width: 0; min-height: 0; overflow: hidden;">
  <div class="header-area" style="align-self: flex-start; width: 100%; min-width: 0;">
    <h3 class="chart-title" style="margin: 0;">Distribución de Gastos por Categoría</h3>
    <p class="chart-subtitle" style="font-size: 0.82rem; color: var(--text-secondary); margin: 4px 0 12px 0; line-height: 1.4;">
      Visualización de las 5 categorías con mayor gasto en el período actual.
    </p>
  </div>
  
  <div class="chart-distribution" style="position: relative; flex: 1; min-height: 0; min-width: 0; width: 100%;">
    <canvas id="distributionCanvas"></canvas>
  </div>
</div>
