 Marian
<section class="analytics-section">
  
  <!-- Columna Izquierda: Flujo de Caja (Line Chart SVG) -->
  <div class="analytics-card card glass-card cashflow-card">
    <div class="card-header-inline">
      <div>
        <h3 class="card-title">Tendencia de Flujo de Caja</h3>
        <p class="card-subtitle">Comparativa histórica de Ingresos vs Egresos</p>
      </div>
      <div class="chart-legends">
        <span class="legend-item"><span class="legend-dot bg-cyan"></span> Ingresos</span>
        <span class="legend-item"><span class="legend-dot bg-purple"></span> Egresos</span>
      </div>
    </div>

    <div class="chart-container">
      <!-- Gráfico SVG fluido -->
      <svg viewBox="0 0 500 220" class="main-svg-chart" width="100%" height="100%">
        <defs>
          <linearGradient id="ingresosGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.0"/>
          </linearGradient>
          <linearGradient id="gastosGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#ab47bc" stop-opacity="0.2"/>
            <stop offset="100%" stop-color="#ab47bc" stop-opacity="0.0"/>
          </linearGradient>
        </defs>
        
        <!-- Cuadrícula de fondo -->
        <line x1="40" y1="30" x2="480" y2="30" stroke="rgba(255,255,255,0.04)" stroke-dasharray="3"/>
        <line x1="40" y1="80" x2="480" y2="80" stroke="rgba(255,255,255,0.04)" stroke-dasharray="3"/>
        <line x1="40" y1="130" x2="480" y2="130" stroke="rgba(255,255,255,0.04)" stroke-dasharray="3"/>
        <line x1="40" y1="180" x2="480" y2="180" stroke="rgba(255,255,255,0.08)"/>

        <!-- Eje X Meses (Dinámico) -->
        <text *ngFor="let punto of flujoCaja; let i = index" [attr.x]="50 + i * 100" y="200" fill="var(--text-muted)" font-size="9" text-anchor="middle">
          {{ punto.mes }}
        </text>

        <!-- Eje Y Valores (Dinámico) -->
        <text *ngFor="let label of yAxisLabels; let i = index" x="30" [attr.y]="34 + i * 50" fill="var(--text-muted)" font-size="8" text-anchor="end">
          {{ label }}
        </text>

        <!-- Gráfico de Ingresos (Línea + Relleno Dinámico) -->
        <path *ngIf="ingresosFillPath" [attr.d]="ingresosFillPath" fill="url(#ingresosGrad)" />
        <path *ngIf="ingresosPath" [attr.d]="ingresosPath" fill="none" stroke="#22d3ee" stroke-width="2.5" />

        <!-- Gráfico de Gastos (Línea + Relleno Dinámico) -->
        <path *ngIf="gastosFillPath" [attr.d]="gastosFillPath" fill="url(#gastosGrad)" />
        <path *ngIf="gastosPath" [attr.d]="gastosPath" fill="none" stroke="#ab47bc" stroke-width="2.5" stroke-dasharray="1"/>

        <!-- Nodos / Puntos interactivos interactivos (Dinámicos) -->
        <circle *ngFor="let p of puntosIngresos" [attr.cx]="p.cx" [attr.cy]="p.cy" r="4" fill="#22d3ee" stroke="#0F172A" stroke-width="1.5" class="chart-node">
          <title>Ingresos: {{ formatCurrency(p.valor) }}</title>
        </circle>
        <circle *ngFor="let p of puntosGastos" [attr.cx]="p.cx" [attr.cy]="p.cy" r="4" fill="#ab47bc" stroke="#0F172A" stroke-width="1.5" class="chart-node">
          <title>Egresos: {{ formatCurrency(p.valor) }}</title>
        </circle>
      </svg>
    </div>
  </div>

  <!-- Columna Derecha: Distribución por Categoría (Doughnut Chart SVG) -->
  <div class="analytics-card card glass-card distribution-card">
    <h3 class="card-title">Distribución de Gastos</h3>
    <p class="card-subtitle">Desglose por categorías representativas</p>

    <div class="donut-section">
      <div class="donut-chart-wrapper">
        <!-- Gráfico Dona SVG -->
        <svg viewBox="0 0 36 36" class="donut-svg">
          <circle class="donut-hole" cx="18" cy="18" r="15.91549430918954" fill="transparent"></circle>
          <circle class="donut-ring" cx="18" cy="18" r="15.91549430918954" fill="transparent" stroke="rgba(255,255,255,0.05)" stroke-width="3"></circle>
          
          <!-- Segmentos dinámicos en base a los datos. -->
          <circle *ngFor="let seg of segmentosDona" class="donut-segment" cx="18" cy="18" r="15.91549430918954" fill="transparent" [attr.stroke]="seg.color" stroke-width="3.2" [attr.stroke-dasharray]="seg.dashArray" [attr.stroke-dashoffset]="seg.dashOffset">
            <title>{{ seg.categoria }}: {{ seg.porcentaje | number:'1.0-0' }}%</title>
          </circle>

          <g class="donut-text">
            <text x="50%" y="47%" class="donut-percent" font-size="5" text-anchor="middle" fill="#FFFFFF">{{ formatCurrency(totalGastado) }}</text>
            <text x="50%" y="65%" class="donut-label">Gastos</text>
          </g>
        </svg>
      </div>

      <!-- Leyendas / Lista de Categorías -->
      <div class="donut-legend-list">
        <div class="legend-row" *ngFor="let item of distribucion">
          <span class="legend-color-indicator" [style.background-color]="item.color"></span>
          <div class="legend-info">
            <span class="legend-name">{{ item.categoria }}</span>
            <span class="legend-percentage">{{ item.porcentaje | number:'1.0-0' }}%</span>
          </div>
          <span class="legend-amount text-mono">{{ formatCurrency(item.total) }}</span>
        </div>
      </div>
    </div>
  </div>

</section>
