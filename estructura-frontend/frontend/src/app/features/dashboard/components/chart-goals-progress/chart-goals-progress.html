<div class="chart-container" style="position: relative; height: 100%; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: space-between; box-sizing: border-box; padding-bottom: 8px;">
  <h3 class="chart-title" style="align-self: flex-start; width: 100%; margin-bottom: 0;">Progreso de Metas</h3>
  
  <div style="position: relative; height: 180px; width: 180px; margin: 0 auto; display: flex; align-items: center; justify-content: center;">
    <canvas id="goalsProgressCanvas"></canvas>
  </div>

  <div *ngIf="activeMeta()" class="meta-details" style="text-align: center; width: 100%; padding: 8px; border-radius: var(--radius-md); background: rgba(0, 0, 0, 0.02); border: 1px dashed var(--border-color); box-sizing: border-box; margin-top: 4px;">
    <h4 style="font-size: 0.95rem; font-weight: 700; color: var(--text-primary); margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
      {{ activeMeta()?.nombre }}
    </h4>
    <p style="font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); margin: 4px 0 0 0;">
      Progreso: <span style="color: var(--color-primary); font-weight: 800;">S/ {{ activeMeta()?.actual | number:'1.0-0' }}</span> / S/ {{ activeMeta()?.objetivo | number:'1.0-0' }}
    </p>
  </div>
  
  <div *ngIf="!activeMeta()" class="meta-details-empty" style="text-align: center; width: 100%; font-size: 0.85rem; color: var(--text-muted); padding: 12px 0;">
    Sin metas activas en este periodo
  </div>
</div>
