# ============================================
# NOMBRES DEL MICROSERVICIO
# ============================================
spring.application.name=microservicio-cliente

# ============================================
# SERVIDOR
# ============================================
server.port=8083

# ============================================
# CREDENCIALES Y DIRECCION DEL SERVIDOR EUREKA
# ============================================
eureka.client.service-url.defaultZone=http://admin:admin123@localhost:8761/eureka/
# ============================================
# CCONFIGURACION DE REGISTRO AL SERVIDOR EUREKA
# ============================================
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
# Desactiva completamente el cliente de Eureka
eureka.client.enabled=false
# =====================================================================
# Optimización para que el dashboard se actualice rápido en desarrollo
# =====================================================================
# Envía una señal de "estoy vivo" cada 10 segundos (por defecto son 30)
eureka.instance.lease-renewal-interval-in-seconds=10
# Si el servidor no recibe señal en 20 segundos, considera al servicio muerto
eureka.instance.lease-expiration-duration-in-seconds=20
# Id único para evitar conflictos si lanzas varias instancias
eureka.instance.instance-id=${spring.application.name}:${server.port}:${random.value}

# URL del microservicio-auditoría
auditoria.service.url=http://localhost:8082/api/v1/auditoria/registrar
# ============================================
# BASE DE DATOS
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/db_microservicio_cliente
spring.datasource.username=postgres
spring.datasource.password=adminUTP
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# JWT (CLAVE PARA TU SISTEMA)
# ============================================
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.jwt.expiration=86400000

# ============================================
# LOGGING (OPTIMIZADO)
# ============================================
logging.level.root=INFO
# Tu proyecto
logging.level.com.cliente=DEBUG
# Seguridad
logging.level.org.springframework.security=DEBUG
# JPA
logging.level.org.hibernate.SQL=DEBUG
# Transacciones
logging.level.org.springframework.transaction=DEBUG
# Formato logs
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
# Archivo de logs
logging.file.name=logs/microservicio-auditoria.log