# ---------------------------------------------------------------------------------------------------------------------
#                            SPRING: Configuración general, perfiles e importación de .env
# ---------------------------------------------------------------------------------------------------------------------
spring:
  config:
    import: "optional:file:../.env[.properties]"
  application:
    name: microservicio-mensajeria
  profiles:
    active: local
  main:
    allow-bean-definition-overriding: true
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

# ---------------------------------------------------------------------------------------------------------------------
#                              DATASOURCE: Conexión y credenciales de PostgreSQL local
# ---------------------------------------------------------------------------------------------------------------------
  datasource:
    url: ${SPRING_DATASOURCE_URL_MENSAJERIA:jdbc:postgresql://localhost:5432/db_microservicio_mensajeria}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:adminUTP}
    driver-class-name: org.postgresql.Driver

# ---------------------------------------------------------------------------------------------------------------------
#                                   JPA: Configuración de persistencia ORM Hibernate
# ---------------------------------------------------------------------------------------------------------------------
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# ---------------------------------------------------------------------------------------------------------------------
#                                   DATA: Configuración de base de datos de Redis
# ---------------------------------------------------------------------------------------------------------------------
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      username: ${SPRING_DATA_REDIS_USERNAME:default}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      ssl:
        enabled: true

# ---------------------------------------------------------------------------------------------------------------------
#                              RABBITMQ: Broker de mensajería asíncrona y topologías
# ---------------------------------------------------------------------------------------------------------------------
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST:/}
    connection-name: ${spring.application.name}
    connection-timeout: 10000
    listener:
      simple:
        auto-startup: true

# ---------------------------------------------------------------------------------------------------------------------
#                                   MAIL: Configuración del servidor de correo SMTP
# ---------------------------------------------------------------------------------------------------------------------
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: smtp.gmail.com
        debug: false

# ---------------------------------------------------------------------------------------------------------------------
#                                   SERVER: Puerto y configuración de red local
# ---------------------------------------------------------------------------------------------------------------------
server:
  port: 8084

# ---------------------------------------------------------------------------------------------------------------------
#                                 MANAGEMENT: Redirecciones de Actuator Health
# ---------------------------------------------------------------------------------------------------------------------
management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      path-mapping:
        health: health-internal

# ---------------------------------------------------------------------------------------------------------------------
#                                  EMAIL: Configuración de origen de correo institucional
# ---------------------------------------------------------------------------------------------------------------------
email:
  from: noreply@utp.com
  soporte: soporte@luka.pe
  nombre:
    empresa: SAAS FINANCIERO

# ---------------------------------------------------------------------------------------------------------------------
#                                 TWILIO: Credenciales e integración del API de Twilio
# ---------------------------------------------------------------------------------------------------------------------
twilio:
  account:
    sid: ${TWILIO_ACCOUNT_SID:}
  auth:
    token: ${TWILIO_AUTH_TOKEN:}
  phone:
    number: ${TWILIO_SMS_FROM:}
  whatsapp:
    from: ${TWILIO_WHATSAPP_FROM:}
  api-key:
    sid: ${TWILIO_API_KEY_SID:}
    secret: ${TWILIO_API_KEY_SECRET:}
    use-api-key: ${TWILIO_USE_API_KEY:false}

# ---------------------------------------------------------------------------------------------------------------------
#                                   LUKA: Credenciales JWT de seguridad local
# ---------------------------------------------------------------------------------------------------------------------
luka:
  jwt:
    clave-secreta: ${JWT_SECRET_KEY:}
    expiracion-ms: 86400000

# ---------------------------------------------------------------------------------------------------------------------
#                                  LOGGING: Configuración y patrón de trazas log
# ---------------------------------------------------------------------------------------------------------------------
logging:
  level:
    root: INFO
    com:
      mensajeria: DEBUG
    org:
      springframework:
        security: WARN
        amqp: WARN
        boot:
          actuate: WARN
  pattern:
    console: "%d{HH:mm:ss} %-5p [%X{correlationId:-NoID}] - %msg%n"
  file:
    name: logs/microservicio-mensajeria.log

# ---------------------------------------------------------------------------------------------------------------------
#                               MICROSERVICIO: Direcciones de conexión de servicios externos
# ---------------------------------------------------------------------------------------------------------------------
microservicio:
  usuario:
    url: ${MS_USUARIO_URL:http://localhost:8081}
  cliente:
    url: ${MS_CLIENTE_URL:http://localhost:8083}
  pago:
    url: ${MS_PAGO_URL:}

# ---------------------------------------------------------------------------------------------------------------------
#                                 MENSAJERIA: Configuración del servicio OTP y desbloqueo
# ---------------------------------------------------------------------------------------------------------------------
mensajeria:
  otp:
    expiracion-minutos: 10
    max-intentos: 3
    bloqueo-horas: 10
  desbloqueo:
    intervalo-ms: 900000

# ---------------------------------------------------------------------------------------------------------------------
#                                RESILIENCE4J: Configuración del limitador de tiempo de llamadas
# ---------------------------------------------------------------------------------------------------------------------
resilience4j:
  timelimiter:
    configs:
      default:
        timeoutDuration: 30s
    instances:
      default:
        timeoutDuration: 30s
