<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Luka App - Notificación</title>
    <style>
        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 0;
            color: #1f2937;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }
        .header {
            background-color: #111827;
            padding: 24px;
            text-align: center;
        }
        .header h1 {
            color: #ffffff;
            margin: 0;
            font-size: 24px;
            letter-spacing: 0.5px;
        }
        .content {
            padding: 32px 24px;
            line-height: 1.6;
        }
        .footer {
            background-color: #f9fafb;
            padding: 20px;
            text-align: center;
            font-size: 13px;
            color: #6b7280;
            border-top: 1px solid #e5e7eb;
        }
        .otp-box {
            background-color: #f3f4f6;
            border: 1px dashed #d1d5db;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            margin: 24px 0;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 4px;
            color: #111827;
        }
        .warning {
            font-size: 14px;
            color: #b91c1c;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 th:text="${appName}">Luka App</h1>
        </div>
        
        <div class="content" th:insert="${content}">
            <!-- El contenido específico de cada plantilla se inyecta aquí -->
        </div>

        <div class="footer">
            <p>Este es un mensaje automático, por favor no respondas a este correo.</p>
            <p>&copy; <span th:text="${#dates.year(#dates.createNow())}"></span> <span th:text="${appName}">Luka App</span>. Todos los derechos reservados.</p>
        </div>
    </div>
</body>
</html>
