luka.jwt.expiracion-ms=86400000

# ============================================
# LOGGING
# ============================================
logging.level.root=INFO
logging.level.com.mensajeria=DEBUG
logging.pattern.console=%d{HH:mm:ss} %-5p - %msg%n
logging.file.name=logs/microservicio-mensajeria.log

# ============================================
# URLs
# ============================================
microservicio.usuario.url=http://localhost:8081
microservicio.cliente.url=http://localhost:8083

# ============================================
# LÓGICA DE NEGOCIO - OTP
# ============================================
mensajeria.otp.expiracion-minutos=10
mensajeria.otp.max-intentos=3
mensajeria.otp.bloqueo-horas=10

# ============================================
# FEIGN OVERRIDING
# ============================================
spring.main.allow-bean-definition-overriding=true
