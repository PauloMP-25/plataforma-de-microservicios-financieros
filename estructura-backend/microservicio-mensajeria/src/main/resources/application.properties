# ============================================
# NOMBRES DEL MICROSERVICIO
# ============================================
spring.application.name=microservicio-mensajeria

# ============================================
# SERVIDOR
# ============================================
server.port=8084

# ============================================
# CREDENCIALES Y DIRECCION DEL SERVIDOR EUREKA
# ============================================
eureka.client.service-url.defaultZone=http://admin:admin123@localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.lease-renewal-interval-in-seconds=10
eureka.instance.lease-expiration-duration-in-seconds=20
eureka.instance.instance-id=${spring.application.name}:${server.port}:${random.value}

# ============================================
# BASE DE DATOS - POSTGRESQL
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/db_luka_mensajeria
spring.datasource.username=postgres
spring.datasource.password=adminUTP
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# REDIS
# ============================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ============================================================
# RABBITMQ
# ============================================================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.connection-name=${spring.application.name}

# ============================================
# EMAIL (GMAIL SMTP)
# ============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=paulomoronpoma@gmail.com
spring.mail.password=inoj ekrn qlcj aztk
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=true

email.from=noreply@utp.com
email.nombre.empresa=SAAS FINANCIERO

# ============================================
# TWILIO (SMS)
# ============================================
twilio.account.sid=${TWILIO_ACCOUNT_SID:dummy}
twilio.auth.token=${TWILIO_AUTH_TOKEN:dummy}
twilio.phone.number=${TWILIO_PHONE_NUMBER:dummy}

# ============================================
# WHATSAPP (Meta Cloud API)
# ============================================
whatsapp.api.token=${WHATSAPP_API_TOKEN:dummy}
whatsapp.api.phone-number-id=${WHATSAPP_PHONE_ID:dummy}
whatsapp.api.version=v19.0

# ============================================
# JWT
# ============================================
