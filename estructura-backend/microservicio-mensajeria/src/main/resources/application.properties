# ============================================
# CARGAR VARIABLES DE ENTORNO DEL .ENV GLOBAL
# ============================================
spring.config.import=optional:file:../.env[.properties]

# ============================================
# NOMBRES DEL MICROSERVICIO
# ============================================
spring.application.name=microservicio-mensajeria
spring.profiles.active=local

# ============================================
# SERVIDOR
# ============================================
server.port=8084

# ============================================
# BASE DE DATOS - POSTGRESQL
# ============================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:db_luka_mensajeria}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:adminUTP}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# REDIS
# ============================================================
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${SPRING_DATA_REDIS_SSL_ENABLED:false}
# ============================================================
# RABBITMQ
# ============================================================
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${SPRING_RABBITMQ_VIRTUAL_HOST:/}
spring.rabbitmq.connection-name=${spring.application.name}
spring.rabbitmq.connection-timeout=10000
spring.rabbitmq.listener.simple.auto-startup=true

# ============================================
# EMAIL (GMAIL SMTP)
# ============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME:paulomoronpoma@gmail.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=false

# SOLUCIÓN AL ERROR SSL/TLS: Forzar confianza en el servidor de Gmail
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# SOLUCIÓN ACTUATOR: Evitar que el fallo de red del Mail tire abajo el /health
management.health.mail.enabled=false

email.from=noreply@utp.com
email.nombre.empresa=SAAS FINANCIERO

# ============================================
# TWILIO (SMS & WHATSAPP)
# ============================================
twilio.account.sid=${TWILIO_ACCOUNT_SID:AC621265d13b02dfda9653f1b20d405093}
twilio.auth.token=${TWILIO_AUTH_TOKEN:b584cf0d58be03e3f4d2fd9d69005394}
twilio.phone.number=${TWILIO_SMS_FROM:+19014176476}
twilio.whatsapp.from=${TWILIO_WHATSAPP_FROM:+14155238886}
twilio.api-key.sid=${TWILIO_API_KEY_SID:}
twilio.api-key.secret=${TWILIO_API_KEY_SECRET:}
twilio.api-key.use-api-key=${TWILIO_USE_API_KEY:false}

# ============================================
# JWT
# ============================================
luka.jwt.clave-secreta=${JWT_SECRET_KEY:}
luka.jwt.expiracion-ms=86400000

# ============================================
# LOGGING - AJUSTADO
# ============================================
logging.level.root=INFO
# Se cambió de com.mensajeria a com.mensajes (Asegúrate de que coincida con tu paquete raíz en Java)
logging.level.com.mensajeria=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
logging.level.org.springframework.amqp=WARN
logging.level.org.springframework.amqp.rabbit=WARN
logging.level.org.springframework.boot.actuate=WARN
logging.pattern.console=%d{HH:mm:ss} %-5p [%X{correlationId:-NoID}] - %msg%n
logging.file.name=logs/microservicio-mensajeria.log

# ============================================
# URLs
# ============================================
microservicio.usuario.url=${MS_USUARIO_URL:http://localhost:8081}
microservicio.cliente.url=${MS_CLIENTE_URL:http://localhost:8083}
microservicio.pago.url=${MS_PAGO_URL:}

# ============================================
# LÓGICA DE NEGOCIO - OTP
# ============================================
mensajeria.otp.expiracion-minutos=10
mensajeria.otp.max-intentos=3
mensajeria.otp.bloqueo-horas=10

# ============================================
# FEIGN OVERRIDING & CIRCUIT BREAKER
# ============================================
spring.main.allow-bean-definition-overriding=true
spring.cloud.openfeign.circuitbreaker.enabled=true

# Aumentar tiempo de espera de Feign/Resilience4j para evitar Timeout de 1s
resilience4j.timelimiter.configs.default.timeoutDuration=30s
resilience4j.timelimiter.instances.default.timeoutDuration=30s

# ============================================
# TAREA PROGRAMADA - DESBLOQUEO
# ============================================
mensajeria.desbloqueo.intervalo-ms=900000

# Redireccion de Actuator Health para usar ControladorSaludCustom de libreria-comun
management.endpoints.web.path-mapping.health=health-internal
