# ============================================
# NOMBRES DEL MICROSERVICIO
# ============================================
spring.application.name=microservicio-mensajeria

# ============================================
# SERVIDOR
# ============================================
server.port=8084

# ============================================
# CREDENCIALES Y DIRECCION DEL SERVIDOR EUREKA
# ============================================
eureka.client.service-url.defaultZone=http://admin:admin123@localhost:8761/eureka/
# ============================================
# CCONFIGURACION DE REGISTRO AL SERVIDOR EUREKA
# ============================================
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# =====================================================================
# Optimización para que el dashboard se actualice rápido en desarrollo
# =====================================================================
# Envía una señal de "estoy vivo" cada 10 segundos (por defecto son 30)
eureka.instance.lease-renewal-interval-in-seconds=10
# Si el servidor no recibe señal en 20 segundos, considera al servicio muerto
eureka.instance.lease-expiration-duration-in-seconds=20
# Id único para evitar conflictos si lanzas varias instancias
eureka.instance.instance-id=${spring.application.name}:${server.port}:${random.value}
# ============================================
# BASE DE DATOS - POSTGRESQL
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/db_microservicio_mensajeria
spring.datasource.username=postgres
spring.datasource.password=adminUTP
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ============================================
# URLS DE MICROSERVICIOS
# ============================================
# Microservicio-Usuario (Feign)
microservicio.usuario.url=http://localhost:8081
# Microservicio-Auditoría (RestTemplate async)
auditoria.service.url=http://localhost:8082/api/v1/auditoria/registrar

