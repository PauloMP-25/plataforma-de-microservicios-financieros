# ============================================
# NOMBRES DEL MICROSERVICIO
# ============================================
spring.application.name=microservicio-mensajeria

# ============================================
# SERVIDOR
# ============================================
server.port=8084

# ============================================
# CREDENCIALES Y DIRECCION DEL SERVIDOR EUREKA
# ============================================
eureka.client.service-url.defaultZone=http://admin:admin123@localhost:8090/eureka/
# ============================================
# CCONFIGURACION DE REGISTRO AL SERVIDOR EUREKA
# ============================================
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
# =====================================================================
# Optimización para que el dashboard se actualice rápido en desarrollo
# =====================================================================
# Envía una señal de "estoy vivo" cada 10 segundos (por defecto son 30)
eureka.instance.lease-renewal-interval-in-seconds=10
# Si el servidor no recibe señal en 20 segundos, considera al servicio muerto
eureka.instance.lease-expiration-duration-in-seconds=20
# Id único para evitar conflictos si lanzas varias instancias
eureka.instance.instance-id=${spring.application.name}:${server.port}:${random.value}
# ============================================
# BASE DE DATOS - POSTGRESQL
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/db_microservicio_mensajeria
spring.datasource.username=postgres
spring.datasource.password=adminUTP
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ============================================================
# RABBITMQ — Configuración de Conexión
# ============================================================
# En producción, reemplazar con variables de entorno:
#   RABBITMQ_HOST, RABBITMQ_PORT, RABBITMQ_USER, RABBITMQ_PASS
 
spring.rabbitmq.connection-name=${spring.application.name}
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}
 
# Virtual host: permite aislar entornos (dev/staging/prod) en el mismo broker
spring.rabbitmq.virtual-host=${RABBITMQ_VHOST:/}
 
# ── Pool de conexiones ────────────────────────────────────────────────────────
# Número de canales por conexión (default: 25)
spring.rabbitmq.cache.channel.size=10
# Tiempo de espera para obtener un canal del pool (ms)
spring.rabbitmq.cache.channel.checkout-timeout=1000
 
# ── Timeouts de conexión ──────────────────────────────────────────────────────
# Tiempo máximo para establecer conexión con el broker (ms)
spring.rabbitmq.connection-timeout=5000
 
# ── Confirmaciones del publicador (Publisher Confirms) ────────────────────────
# CORRELATED: Spring espera confirmación del broker por cada mensaje enviado.
# Garantiza que el mensaje llegó al exchange (no a la cola).
# Activar solo si se necesita garantía fuerte de entrega en el publicador.
spring.rabbitmq.publisher-confirm-type=correlated
 
# Publisher Returns: notifica si el mensaje no fue enrutado a ninguna cola.
# Útil para detectar errores de configuración en los bindings.
spring.rabbitmq.publisher-returns=true
 
# ── Reconexión automática ─────────────────────────────────────────────────────
# Spring AMQP reintenta la conexión automáticamente si el broker se cae.
# Los valores definen el backoff exponencial entre intentos.
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.max-interval=10000
spring.rabbitmq.listener.simple.retry.multiplier=2.0
 
# ── Acknowledgement ───────────────────────────────────────────────────────────
# AUTO: Spring confirma automáticamente si el método listener no lanza excepción.
# Si lanza RuntimeException → reencola. Si lanza AmqpRejectAndDontRequeue → DLQ.
spring.rabbitmq.listener.simple.acknowledge-mode=auto
 
# Número máximo de mensajes prefetch por consumidor.
# 1 = procesar un mensaje a la vez (más justo entre consumidores concurrentes)
spring.rabbitmq.listener.simple.prefetch=1
 
# ── Concurrencia de consumidores ──────────────────────────────────────────────
# min-concurrency: hilos mínimos por listener (uno por cola)
# max-concurrency: escala automáticamente bajo alta carga
spring.rabbitmq.listener.simple.concurrency=1
spring.rabbitmq.listener.simple.max-concurrency=3
 
# ── Management UI (opcional, solo en desarrollo) ──────────────────────────────
# Puerto de la consola web de RabbitMQ: http://localhost:15672
# Usuario y contraseña son los mismos de spring.rabbitmq.username/password

