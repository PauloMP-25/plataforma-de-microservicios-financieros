server:
  port: 8090

spring:
  config:
    import: optional:file:../../.env[.properties]
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      connect-timeout: 2s
      timeout: 1s

  cloud:
    gateway:
      httpclient:
        connect-timeout: 30000
        response-timeout: ${GATEWAY_RESPONSE_TIMEOUT:60s}
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      routes:
        - id: servicio-usuario-auth
          uri: lb://MICROSERVICIO-USUARIO
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - name: CircuitBreaker
              args:
                name: usuarioCB
                fallbackUri: forward:/fallback
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 3
                redis-rate-limiter.burstCapacity: 5
                key-resolver: "#{@userKeyResolver}"
          metadata:
            requiere-autenticacion: false

        - id: usuario-protegido
          uri: lb://MICROSERVICIO-USUARIO
          predicates:
            - Path=/api/v1/auth/cambiar-password
            - Path=/api/v1/auth/mi-cuenta
            - Path=/api/v1/auth/logout
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - name: CircuitBreaker
              args:
                name: usuarioCB
                fallbackUri: forward:/fallback
          metadata:
            requiere-autenticacion: true

        - id: servicio-cliente-interno
          uri: lb://MICROSERVICIO-CLIENTE
          predicates:
            - Path=/api/v1/clientes/perfil/inicial
            - Path=/api/v1/clientes/interno/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - name: CircuitBreaker
              args:
                name: clienteCB
                fallbackUri: forward:/fallback
          metadata:
            requiere-autenticacion: false

        - id: servicio-cliente
          uri: lb://MICROSERVICIO-CLIENTE
          predicates:
            - Path=/api/v1/clientes/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: clienteCB
                fallbackUri: forward:/fallback
          metadata:
            requiere-autenticacion: true

        - id: servicio-auditoria
          uri: lb://MICROSERVICIO-AUDITORIA
          predicates:
            - Path=/api/v1/auditoria/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - name: CircuitBreaker
              args:
                name: auditoriaCB
                fallbackUri: forward:/fallback
          metadata:
            requiere-autenticacion: true
            rol-requerido: ROLE_ADMIN

        - id: servicio-mensajeria-otp
          uri: lb://MICROSERVICIO-MENSAJERIA
          predicates:
            - Path=/api/v1/mensajeria/otp/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - name: CircuitBreaker
              args:
                name: mensajeriaCB
                fallbackUri: forward:/fallback
          metadata:
            requiere-autenticacion: false

        - id: servicio-nucleo-financiero
          uri: lb://MICROSERVICIO-NUCLEO-FINANCIERO
          predicates:
            - Path=/api/v1/financiero/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: financieroCB
                fallbackUri: forward:/fallback
          metadata:
            requiere-autenticacion: true

        - id: servicio-ia
          uri: lb://MICROSERVICIO-IA
          predicates:
            - Path=/api/v1/ia/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 1
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: iaCB
                fallbackUri: forward:/fallback
          metadata:
            requiere-autenticacion: true

        - id: servicio-pagos-webhook
          uri: lb://MICROSERVICIO-PAGO
          predicates:
            - Path=/api/v1/pagos/webhook/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - name: CircuitBreaker
              args:
                name: pagoCB
                fallbackUri: forward:/fallback
          metadata:
            requiere-autenticacion: false

        - id: servicio-pagos-usuarios
          uri: lb://MICROSERVICIO-PAGO
          predicates:
            - Path=/api/v1/pagos/checkout/**
            - Path=/api/v1/pagos/mi-suscripcion/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - name: CircuitBreaker
              args:
                name: pagoCB
                fallbackUri: forward:/fallback
          metadata:
            requiere-autenticacion: true

        - id: servicio-pagos-admin
          uri: lb://MICROSERVICIO-PAGO
          predicates:
            - Path=/api/v1/pagos/admin/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - name: CircuitBreaker
              args:
                name: pagoCB
                fallbackUri: forward:/fallback
          metadata:
            requiere-autenticacion: true
            rol-requerido: ROLE_ADMIN

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:5173"
              - ${FRONTEND_URL:http://localhost:3000}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER:admin}:${EUREKA_PASSWORD:admin123}@${EUREKA_HOST:localhost}:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
    registry-fetch-interval-seconds: 5
  instance:
    prefer-ip-address: true
    lease-expiration-duration-in-seconds: 20
    lease-renewal-interval-in-seconds: 10

app:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:}
    rutas-publicas: "/auth/,/api/v1/mensajeria/otp/,/api/v1/pagos/webhook/,/v3/api-docs,/swagger-ui,/actuator/,/error/"

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.security: WARN
    com.financiero.saas.gateway: DEBUG
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 5s
        failure-rate-threshold: 50
        event-consumer-buffer-size: 10
    instances:
      usuarioCB:
        base-config: default
      clienteCB:
        base-config: default
      auditoriaCB:
        base-config: default
      mensajeriaCB:
        base-config: default
      financieroCB:
        base-config: default
      iaCB:
        base-config: default
      pagoCB:
        base-config: default
  timelimiter:
    configs:
      default:
        timeout-duration: 5s
    instances:
      usuarioCB:
        base-config: default
      clienteCB:
        base-config: default
      auditoriaCB:
        base-config: default
      mensajeriaCB:
        base-config: default
      financieroCB:
        base-config: default
      iaCB:
        base-config: default
      pagoCB:
        base-config: default
