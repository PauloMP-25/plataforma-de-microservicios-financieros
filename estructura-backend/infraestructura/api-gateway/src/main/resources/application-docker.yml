# ═══════════════════════════════════════════════════════════════════════════════
#  LUKA APP — application-docker.yml (API GATEWAY)
#  Perfil Spring Boot activo cuando SPRING_PROFILES_ACTIVE=docker
# ═══════════════════════════════════════════════════════════════════════════════

server:
  port: 8080 # El puerto interno en Docker (mapeado al 8080 en el host)

spring:
  application:
    name: api-gateway

  # ─────────────────────────────────────────────────────────────────────────
  # REDIS: Necesario para Rate Limiting
  # ─────────────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      connect-timeout: 2s
      timeout: 1s

  # ═══════════════════════════════════════════════════════════════════════════
  # SPRING CLOUD GATEWAY — CONFIGURACIÓN CENTRAL
  # ═══════════════════════════════════════════════════════════════════════════
  cloud:
    gateway:
      httpclient:
        connect-timeout: 30000
        response-timeout: 5s 
      
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      
      # ─────────────────────────────────────────────────────────────────────
      # RUTAS DEFINIDAS MANUALMENTE
      # ─────────────────────────────────────────────────────────────────────
      routes:
        # ┌─────────────────────────────────────────────────────────┐
        # │  MICROSERVICIO-USUARIO                                  │
        # └─────────────────────────────────────────────────────────┘
        - id: servicio-usuario-auth
          uri: lb://MICROSERVICIO-USUARIO
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - name: CircuitBreaker
              args:
                name: usuarioCB
                fallbackUri: forward:/fallback
          metadata:
            requiere-autenticacion: false

        - id: usuario-protegido
          uri: lb://MICROSERVICIO-USUARIO
          predicates:
            - Path=/api/v1/auth/cambiar-password
            - Path=/api/v1/auth/mi-cuenta
            - Path=/api/v1/auth/logout
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - name: CircuitBreaker
              args:
                name: usuarioCB
                fallbackUri: forward:/fallback
          metadata:
            requiere-autenticacion: true

        # ┌─────────────────────────────────────────────────────────┐
        # │  MICROSERVICIO-CLIENTE                                  │
        # └─────────────────────────────────────────────────────────┘
        - id: servicio-cliente-interno
          uri: lb://MICROSERVICIO-CLIENTE
          predicates:
            - Path=/api/v1/clientes/perfil/inicial
            - Path=/api/v1/clientes/interno/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - name: CircuitBreaker
              args:
                name: clienteCB
                fallbackUri: forward:/fallback
          metadata:
            requiere-autenticacion: false

        - id: servicio-cliente
          uri: lb://MICROSERVICIO-CLIENTE
          predicates:
            - Path=/api/v1/clientes/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: clienteCB
                fallbackUri: forward:/fallback
          metadata:
            requiere-autenticacion: true

        # ┌─────────────────────────────────────────────────────────┐
        # │  MICROSERVICIO-AUDITORIA                                │
        # └─────────────────────────────────────────────────────────┘
        - id: servicio-auditoria
          uri: lb://MICROSERVICIO-AUDITORIA
          predicates:
            - Path=/api/v1/auditoria/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - name: CircuitBreaker
              args:
                name: auditoriaCB
                fallbackUri: forward:/fallback
          metadata:
            requiere-autenticacion: true
            rol-requerido: ROLE_ADMIN

        # ┌─────────────────────────────────────────────────────────┐
        # │  MICROSERVICIO-MENSAJERIA                               │
        # └─────────────────────────────────────────────────────────┘
        - id: servicio-mensajeria-otp
          uri: lb://MICROSERVICIO-MENSAJERIA
          predicates:
            - Path=/api/v1/mensajeria/otp/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - name: CircuitBreaker
              args:
                name: mensajeriaCB
                fallbackUri: forward:/fallback
          metadata:
            requiere-autenticacion: false

        # ┌─────────────────────────────────────────────────────────┐
        # │  MICROSERVICIO-NUCLEO-FINANCIERO                        │
        # └─────────────────────────────────────────────────────────┘
        - id: servicio-nucleo-financiero
          uri: lb://MICROSERVICIO-NUCLEO-FINANCIERO
          predicates:
            - Path=/api/v1/financiero/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"
            - name: CircuitBreaker
              args:
                name: financieroCB
                fallbackUri: forward:/fallback
          metadata:
            requiere-autenticacion: true
            
        # ┌─────────────────────────────────────────────────────────┐
        # │ EXCEPCIÓN: Rutas de Actuator de todos los microservicios│
        # │ Para que Docker/K8s puedan revisar el healthcheck libres│
        # └─────────────────────────────────────────────────────────┘
        - id: rutas-actuator-publicas
          uri: no://op # No redirige, solo clasifica
          predicates:
            - Path=/**/actuator/**
          metadata:
            requiere-autenticacion: false

      # ─────────────────────────────────────────────────────────────────────
      # CORS GLOBAL: Aplica a todas las rutas del Gateway
      # ─────────────────────────────────────────────────────────────────────
      globalcors:
        corsConfigurations:
          '[/**]':
            # En producción, reemplazar '*' con tu dominio real:
            # allowedOrigins: "https://tu-app.com"
            allowedOrigins:
              - "http://localhost:3000"    # React/Next.js dev
              - "http://localhost:5173"    # Vite dev
              - ${FRONTEND_URL:http://localhost:3000}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders:
              - "*"
            allowCredentials: true
            # Cuánto tiempo el browser cachea la respuesta preflight (OPTIONS)
            maxAge: 3600

# ═══════════════════════════════════════════════════════════════════════════
# EUREKA CLIENT: El Gateway se registra Y busca otros servicios
# ═══════════════════════════════════════════════════════════════════════════
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE}
    fetch-registry: true
    register-with-eureka: true
    registry-fetch-interval-seconds: 10
    eureka-connection-idle-timeout-seconds: 30
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:api-gateway}
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    health-check-url-path: /actuator/health
    status-page-url-path: /actuator/info
    metadata-map:
      startup: ${random.int}

# ═══════════════════════════════════════════════════════════════════════════
# JWT: Clave compartida para validar tokens (la de todos los ms)
# En producción: usa variable de entorno JWT_SECRET_KEY
# ═══════════════════════════════════════════════════════════════════════════
app:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

# ═══════════════════════════════════════════════════════════════════════════
# ACTUATOR (Health Checks)
# ═══════════════════════════════════════════════════════════════════════════
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,metrics,env
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    gateway:
      enabled: true

# ═══════════════════════════════════════════════════════════════════════════
# LOGGING
# ═══════════════════════════════════════════════════════════════════════════
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  level:
    root: INFO
    org.springframework.cloud.gateway: INFO
    org.springframework.security: WARN
    com.netflix.eureka: WARN
    com.netflix.discovery: WARN