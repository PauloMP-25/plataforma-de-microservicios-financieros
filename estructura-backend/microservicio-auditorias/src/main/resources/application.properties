# ============================================
# NOMBRE DEL MICROSERVICIO
# ============================================
spring.application.name=microservicio-auditoria

# ============================================
# SERVIDOR
# ============================================
server.port=8082

# ============================================
# BASE DE DATOS - POSTGRESQL
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/db_microservicio_auditoria
spring.datasource.username=postgres
spring.datasource.password=adminUTP
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ============================================
# LÓGICA DE SEGURIDAD - DETECCIÓN DE FUERZA BRUTA
# ============================================
# Número de fallos consecutivos antes de bloquear la IP
auditoria.seguridad.max-intentos-fallidos=3
# Ventana de tiempo (minutos) para contar los intentos fallidos
auditoria.seguridad.ventana-minutos=10
# Duración del bloqueo automático (minutos)
auditoria.seguridad.bloqueo-minutos=30

# ============================================
# LOGGING
# ============================================
logging.level.root=INFO
logging.level.com.auditoria=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.transaction=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/microservicio-auditoria.log