# ---------------------------------------------------------------------------------------------------------------------
#                            SERVER: Puerto y configuración de red local
# ---------------------------------------------------------------------------------------------------------------------
server:
  port: 8080

# ---------------------------------------------------------------------------------------------------------------------
#                            SPRING: Configuración general, perfiles e importación de .env.local
# ---------------------------------------------------------------------------------------------------------------------
spring:
  config:
    import: "optional:file:../../.env.local[.properties]"
  application:
    name: api-gateway

# ---------------------------------------------------------------------------------------------------------------------
#                             CLOUD: Configuración de Spring Cloud y rutas de Gateway
# ---------------------------------------------------------------------------------------------------------------------
  cloud:
    gateway:
      httpclient:
        connect-timeout: 30000
        response-timeout: 60s
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

      routes:
        - id: servicio-usuario-docs
          uri: http://localhost:8081
          predicates:
            - Path=/microservicio-usuario/v3/api-docs/**, /microservicio-usuario/swagger-ui/**, /microservicio-usuario/swagger-ui.html
          filters:
            - RewritePath=/microservicio-usuario/(?<remaining>.*), /${remaining}
          metadata:
            requiere-autenticacion: false

        - id: servicio-cliente-docs
          uri: http://localhost:8083
          predicates:
            - Path=/microservicio-cliente/v3/api-docs/**, /microservicio-cliente/swagger-ui/**, /microservicio-cliente/swagger-ui.html
          filters:
            - RewritePath=/microservicio-cliente/(?<remaining>.*), /${remaining}
          metadata:
            requiere-autenticacion: false

        - id: servicio-auditoria-docs
          uri: http://localhost:8082
          predicates:
            - Path=/microservicio-auditoria/v3/api-docs/**, /microservicio-auditoria/swagger-ui/**, /microservicio-auditoria/swagger-ui.html
          filters:
            - RewritePath=/microservicio-auditoria/(?<remaining>.*), /${remaining}
          metadata:
            requiere-autenticacion: false

        - id: servicio-mensajeria-docs
          uri: http://localhost:8084
          predicates:
            - Path=/microservicio-mensajeria/v3/api-docs/**, /microservicio-mensajeria/swagger-ui/**, /microservicio-mensajeria/swagger-ui.html
          filters:
            - RewritePath=/microservicio-mensajeria/(?<remaining>.*), /${remaining}
          metadata:
            requiere-autenticacion: false

        - id: servicio-financiero-docs
          uri: http://localhost:8085
          predicates:
            - Path=/microservicio-financiero/v3/api-docs/**, /microservicio-financiero/swagger-ui/**, /microservicio-financiero/swagger-ui.html
          filters:
            - RewritePath=/microservicio-financiero/(?<remaining>.*), /${remaining}
          metadata:
            requiere-autenticacion: false

        - id: servicio-ia-docs
          uri: http://localhost:8086
          predicates:
            - Path=/microservicio-ia/v3/api-docs/**, /microservicio-ia/swagger-ui/**, /microservicio-ia/swagger-ui.html
          filters:
            - RewritePath=/microservicio-ia/(?<remaining>.*), /${remaining}
          metadata:
            requiere-autenticacion: false

        - id: servicio-pagos-docs
          uri: http://localhost:8087
          predicates:
            - Path=/microservicio-pagos/v3/api-docs/**, /microservicio-pagos/swagger-ui/**, /microservicio-pagos/swagger-ui.html
          filters:
            - RewritePath=/microservicio-pagos/(?<remaining>.*), /${remaining}
          metadata:
            requiere-autenticacion: false

        - id: servicio-suscripciones-docs
          uri: http://localhost:8088
          predicates:
            - Path=/microservicio-suscripciones/v3/api-docs/**, /microservicio-suscripciones/swagger-ui/**, /microservicio-suscripciones/swagger-ui.html
          filters:
            - RewritePath=/microservicio-suscripciones/(?<remaining>.*), /${remaining}
          metadata:
            requiere-autenticacion: false

        - id: servicio-usuario-auth
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - name: CircuitBreaker
              args:
                name: usuarioCB
                fallbackUri: forward:/fallback
          metadata:
            requiere-autenticacion: false

        - id: usuario-protegido
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/cambiar-password
            - Path=/api/v1/auth/mi-cuenta
            - Path=/api/v1/auth/logout
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - name: CircuitBreaker
              args:
                name: usuarioCB
                fallbackUri: forward:/fallback
          metadata:
            requiere-autenticacion: true

        - id: servicio-suscripciones
          uri: http://localhost:8088
          predicates:
            - Path=/api/v1/suscripciones/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - name: CircuitBreaker
              args:
                name: suscripcionCB
                fallbackUri: forward:/fallback
          metadata:
            requiere-autenticacion: true

        - id: servicio-auditoria
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/auditoria/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - name: CircuitBreaker
              args:
                name: auditoriaCB
                fallbackUri: forward:/fallback
          metadata:
            requiere-autenticacion: true
            rol-requerido: ROLE_ADMIN

        - id: servicio-mensajeria-otp
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/mensajeria/otp/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - name: CircuitBreaker
              args:
                name: mensajeriaCB
                fallbackUri: forward:/fallback
          metadata:
            requiere-autenticacion: false

        - id: servicio-mensajeria-soporte
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/mensajeria/soporte/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - PreserveHostHeader
            - name: CircuitBreaker
              args:
                name: mensajeriaCB
                fallbackUri: forward:/fallback
          metadata:
            requiere-autenticacion: true

        - id: servicio-pagos
          uri: http://localhost:8087
          predicates:
            - Path=/api/v1/pagos/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - name: CircuitBreaker
              args:
                name: pagoCB
                fallbackUri: forward:/fallback
          metadata:
            requiere-autenticacion: true

        - id: servicio-nucleo-financiero
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/financiero/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - name: CircuitBreaker
              args:
                name: financieroCB
                fallbackUri: forward:/fallback
          metadata:
            requiere-autenticacion: true

        - id: servicio-cliente-interno
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/clientes/perfil/inicial
            - Path=/api/v1/clientes/interno/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - name: CircuitBreaker
              args:
                name: clienteCB
                fallbackUri: forward:/fallback
          metadata:
            requiere-autenticacion: false

        - id: servicio-cliente
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/clientes/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - name: CircuitBreaker
              args:
                name: clienteCB
                fallbackUri: forward:/fallback
          metadata:
            requiere-autenticacion: true

        - id: servicio-ia
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/ia/**
          filters:
            - StripPrefix=0
            - AddRequestHeader=X-Gateway-Source, api-gateway
            - name: CircuitBreaker
              args:
                name: iaCB
                fallbackUri: forward:/fallback
          metadata:
            requiere-autenticacion: true

# ---------------------------------------------------------------------------------------------------------------------
#                        GLOBALCORS: Configuración de CORS global para orígenes cruzados
# ---------------------------------------------------------------------------------------------------------------------
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:4200"
              - "http://localhost:5173"
              - ${FRONTEND_URL:http://localhost:3000}
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600

# ---------------------------------------------------------------------------------------------------------------------
#                               APP: Configuración del token JWT de seguridad
# ---------------------------------------------------------------------------------------------------------------------
app:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY:}
    rutas-publicas: "/auth/,/api/v1/mensajeria/otp/,/api/v1/pagos/webhook,/api/v1/pagos/webhook/mercadopago,/v3/api-docs,/swagger-ui,/actuator/,/error/,/interno/,/api/v1/clientes/perfil/inicial"

# ---------------------------------------------------------------------------------------------------------------------
#                           LOGGING: Configuración y patrón de trazas log
# ---------------------------------------------------------------------------------------------------------------------
logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.security: WARN
    root: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ---------------------------------------------------------------------------------------------------------------------
#                        MANAGEMENT: Redirecciones de Actuator Health
# ---------------------------------------------------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health, info, gateway
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true

# ---------------------------------------------------------------------------------------------------------------------
#                      RESILIENCE4J: Configuración de limitadores y tolerancia a fallos
# ---------------------------------------------------------------------------------------------------------------------
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        permitted-number-of-calls-in-half-open-state: 3
        wait-duration-in-open-state: 5s
        failure-rate-threshold: 50
        event-consumer-buffer-size: 10
    instances:
      usuarioCB:
        base-config: default
      suscripcionCB:
        base-config: default
      financieroCB:
        base-config: default
      clienteCB:
        base-config: default
      iaCB:
        base-config: default
      auditoriaCB:
        base-config: default
      mensajeriaCB:
        base-config: default
      pagoCB:
        base-config: default
  timelimiter:
    configs:
      default:
        timeout-duration: 15s
    instances:
      usuarioCB:
        base-config: default
      suscripcionCB:
        base-config: default
      financieroCB:
        base-config: default
      clienteCB:
        base-config: default
      iaCB:
        base-config: default
      auditoriaCB:
        base-config: default
      mensajeriaCB:
        base-config: default
      pagoCB:
        base-config: default


# Desactivar discovery y eureka
spring:
  cloud:
    discovery:
      enabled: false

management:
  health:
    discovery:
      enabled: false
