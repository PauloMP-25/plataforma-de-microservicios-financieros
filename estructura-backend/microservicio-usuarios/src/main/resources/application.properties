spring.application.name=microservicio-usuario

# ============================================
# SERVIDOR
# ============================================
server.port=8081
# ============================================
# MICROSERVICIO-CLIENTE (comunicación síncrona)
# ============================================
cliente.service.base-url=http://localhost:8084
cliente.service.perfil-inicial.url=${cliente.service.base-url}/api/v1/clientes/inicial
# ============================================
# MICROSERVICIO-AUDITORIA (comunicación síncrona)
# ============================================
auditoria.service.base-url=http://localhost:8082
auditoria.service.url=${auditoria.service.base-url}/api/v1/auditoria/registrar

# ============================================
# BASE DE DATOS - POSTGRESQL
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/db_microservicio_usuario
spring.datasource.username=postgres
spring.datasource.password=adminUTP
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ============================================
# JWT (CLAVE PARA TU SISTEMA)
# ============================================
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
application.security.jwt.expiration=86400000

# ============================================
# BLOQUEO DE IPs (IpBlockerService)
# ============================================
application.ip-blocker.max-attempts=3
application.ip-blocker.window-minutes=5
application.ip-blocker.block-duration-hours=24

# ============================================
# EMAIL (GMAIL SMTP)
# ============================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Datos del remitente
email.from=${EMAIL_FROM:noreply@tuapp.com}
email.nombre.empresa=${EMAIL_NOMBRE_EMPRESA:MI_APP}

# ============================================
# LOGGING (OPTIMIZADO)
# ============================================
logging.level.root=INFO

# Tu proyecto
logging.level.com.iam=DEBUG

# Seguridad
logging.level.org.springframework.security=DEBUG

# JPA
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Transacciones
logging.level.org.springframework.transaction=DEBUG

# Formato logs
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Archivo de logs
logging.file.name=logs/iam-service.log
logging.file.max-size=10MB
logging.file.max-history=30