# ---------------------------------------------------------------------------------------------------------------------
#                            SPRING: Configuración general y perfiles
# ---------------------------------------------------------------------------------------------------------------------
spring:
  application:
    name: ms-pagos

# ---------------------------------------------------------------------------------------------------------------------
#                              DATASOURCE: Conexión y credenciales de PostgreSQL local
# ---------------------------------------------------------------------------------------------------------------------
  datasource:
    url: ${SPRING_DATASOURCE_URL_PAGOS:jdbc:postgresql://localhost:5432/db_microservicio_pagos}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 60000
      initialization-fail-timeout: 120000

# ---------------------------------------------------------------------------------------------------------------------
#                                   JPA: Configuración de persistencia ORM Hibernate
# ---------------------------------------------------------------------------------------------------------------------
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        show_sql: false
    open-in-view: false

# ---------------------------------------------------------------------------------------------------------------------
#                              RABBITMQ: Broker de mensajería asíncrona y topologías
# ---------------------------------------------------------------------------------------------------------------------
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:rabbitmq}
    port: ${SPRING_RABBITMQ_PORT:5671}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST:/}
    ssl:
      enabled: ${SPRING_RABBITMQ_SSL_ENABLED:false}
      algorithm: ${SPRING_RABBITMQ_SSL_ALGORITHM:TLSv1.2}
    connection-name: ${spring.application.name}
    connection-timeout: 10000
    listener:
      simple:
        auto-startup: true

# ---------------------------------------------------------------------------------------------------------------------
#                                   SERVER: Puerto y configuración de red local
# ---------------------------------------------------------------------------------------------------------------------
server:
  port: 8087

# ---------------------------------------------------------------------------------------------------------------------
#                                 MANAGEMENT: Redirecciones de Actuator Health
# ---------------------------------------------------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# ---------------------------------------------------------------------------------------------------------------------
#                                   LUKA: Credenciales JWT de seguridad local
# ---------------------------------------------------------------------------------------------------------------------
luka:
  jwt:
    clave-secreta: ${JWT_SECRET_KEY:}

# ---------------------------------------------------------------------------------------------------------------------
#                                 STRIPE: Credenciales e integración de pagos Stripe
# ---------------------------------------------------------------------------------------------------------------------
stripe:
  api-key: ${STRIPE_SECRET_KEY:sk_test_mock_secret}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_mock_secret}
  success-url: ${FRONTEND_URL:http://localhost:3000}/suscripcion/exito
  cancel-url: ${FRONTEND_URL:http://localhost:3000}/suscripcion/cancelado


# Desactivar discovery y eureka
spring:
  cloud:
    discovery:
      enabled: false

management:
  health:
    discovery:
      enabled: false
