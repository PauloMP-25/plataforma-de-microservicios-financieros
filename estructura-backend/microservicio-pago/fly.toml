app = "luka-ms-pago"
primary_region = "iad"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8087"
  JAVA_TOOL_OPTIONS = "-XX:+UseContainerSupport -Xmx150m -Xss256k -XX:CICompilerCount=2"

[http_service]
  internal_port = 8087
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
