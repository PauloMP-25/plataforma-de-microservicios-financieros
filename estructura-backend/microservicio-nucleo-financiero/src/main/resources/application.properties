# ============================================
# NOMBRES DEL MICROSERVICIO
# ============================================
spring.application.name=microservicio-nucleo-financiero

# ============================================
# SERVIDOR
# ============================================
server.port=8085

# ============================================
# CREDENCIALES Y DIRECCION DEL SERVIDOR EUREKA
# ============================================
eureka.client.service-url.defaultZone=http://admin:admin123@localhost:8761/eureka/
# ============================================
# CCONFIGURACION DE REGISTRO AL SERVIDOR EUREKA
# ============================================
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# =====================================================================
# Optimización para que el dashboard se actualice rápido en desarrollo
# =====================================================================
# Envía una señal de "estoy vivo" cada 10 segundos (por defecto son 30)
eureka.instance.lease-renewal-interval-in-seconds=10
# Si el servidor no recibe señal en 20 segundos, considera al servicio muerto
eureka.instance.lease-expiration-duration-in-seconds=20
# Id único para evitar conflictos si lanzas varias instancias
eureka.instance.instance-id=${spring.application.name}:${server.port}:${random.value}
# ============================================
# BASE DE DATOS - POSTGRESQL
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/db_luka_financiero
spring.datasource.username=postgres
spring.datasource.password=adminUTP
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ============================================================
# RABBITMQ — Configuración de Conexión
# ============================================================
# En producción, reemplazar con variables de entorno:
#   RABBITMQ_HOST, RABBITMQ_PORT, RABBITMQ_USER, RABBITMQ_PASS
spring.rabbitmq.connection-name=${spring.application.name}
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

# ============================================
# JWT (CLAVE PARA TU SISTEMA)
# ============================================
luka.jwt.clave-secreta=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
luka.jwt.expiracion-ms=86400000

# ============================================
# DOCUMENTACION
# ============================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
# Esto ayuda si hay problemas con los modelos
springdoc.writer-with-default-pretty-printer=true

# ============================================
# LOGGING (OPTIMIZADO)
# ============================================
logging.level.root=INFO
# Tu proyecto
logging.level.com.nucleo.financiero=DEBUG
# Seguridad
logging.level.org.springframework.security=DEBUG
# JPA
logging.level.org.hibernate.SQL=DEBUG
# Transacciones
logging.level.org.springframework.transaction=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.amqp.rabbit=DEBUG
# Formato logs más corto
logging.pattern.console=%d{HH:mm:ss} %-5p - %msg%n
# Archivo de logs
logging.file.name=logs/microservicio-nucleo-financiero.log
