# ============================================
# CARGAR VARIABLES DE ENTORNO DEL .ENV GLOBAL
# ============================================
spring.config.import=optional:file:../.env[.properties]

# ============================================
# NOMBRES DEL MICROSERVICIO
# ============================================
spring.application.name=microservicio-nucleo-financiero
spring.profiles.active=local

# ============================================
# SERVIDOR
# ============================================
server.port=8085

# ============================================
# BASE DE DATOS - POSTGRESQL
# ============================================
spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/db_luka_financiero
spring.datasource.username=postgres
spring.datasource.password=adminUTP
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ============================================================
# RABBITMQ — Configuración de Conexión
# ============================================================
spring.rabbitmq.connection-name=${spring.application.name}
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${SPRING_RABBITMQ_VIRTUAL_HOST:/}
spring.rabbitmq.connection-timeout=10000
spring.rabbitmq.listener.simple.auto-startup=true

# ============================================
# JWT (CLAVE PARA TU SISTEMA)
# ============================================
luka.jwt.clave-secreta=${JWT_SECRET_KEY:}
luka.jwt.expiracion-ms=86400000

# ============================================
# INTEGRACIONES
# ============================================
microservicio.ia.url=${URL_IA:http://localhost:8086}

# ============================================================
# DOCUMENTACION
# ============================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
# Esto ayuda si hay problemas con los modelos
springdoc.writer-with-default-pretty-printer=true

# ============================================
# LOGGING (OPTIMIZADO)
# ============================================
logging.level.root=INFO
# Tu proyecto
logging.level.com.nucleo.financiero=DEBUG
# Seguridad
logging.level.org.springframework.security=WARN
# JPA
logging.level.org.hibernate.SQL=INFO
# Transacciones
logging.level.org.springframework.transaction=INFO
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
logging.level.org.springframework.amqp=WARN
logging.level.org.springframework.amqp.rabbit=WARN
logging.level.org.springframework.boot.actuate=WARN
# Formato logs más corto
logging.pattern.console=%d{HH:mm:ss} %-5p [%X{correlationId:-NoID}] - %msg%n
# Archivo de logs
logging.file.name=logs/microservicio-nucleo-financiero.log

# Redireccion de Actuator Health para usar ControladorSaludCustom de libreria-comun
management.endpoints.web.path-mapping.health=health-internal
