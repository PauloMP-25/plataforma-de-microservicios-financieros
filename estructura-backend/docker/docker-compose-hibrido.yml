# 🛡️ LUKA APP — docker-compose-hibrido.yml (v4.0 - 100% LOCAL)
# Optimizado para entorno local: microservicios en Docker + PostgreSQL/Redis/RabbitMQ en host

networks:
  luka-network:
    driver: bridge
    name: luka-hibrido

x-spring-base: &spring-base
  restart: unless-stopped
  networks:
    - luka-network

x-env-common: &env-common
  SPRING_PROFILES_ACTIVE: local
  SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
  # RabbitMQ (Ejecutándose en host local)
  SPRING_RABBITMQ_HOST: host.docker.internal
  SPRING_RABBITMQ_PORT: 5672
  SPRING_RABBITMQ_USERNAME: guest
  SPRING_RABBITMQ_PASSWORD: guest
  SPRING_RABBITMQ_VIRTUAL_HOST: /
  # Redis (Ejecutándose en host local)
  REDIS_HOST: host.docker.internal
  REDIS_PORT: 6379
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  REDIS_SSL_ENABLED: "false"
  SPRING_DATA_REDIS_HOST: host.docker.internal
  SPRING_DATA_REDIS_PORT: 6379
  SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  SPRING_DATA_REDIS_SSL_ENABLED: "false"
  # Eureka deshabilitado por estándar local del repositorio
  EUREKA_CLIENT_ENABLED: "false"
  SPRING_CLOUD_DISCOVERY_ENABLED: "false"
  # Actuator local: exponer endpoints básicos
  MANAGEMENT_ENDPOINTS_WEB_BASE_PATH: /actuator
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics,gateway
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: always
  MANAGEMENT_HEALTH_REDIS_ENABLED: "true"
  MANAGEMENT_HEALTH_DISCOVERY_ENABLED: "false"
  # Redirigir headers de proxy (necesario para Swagger detrás del Gateway)
  SERVER_FORWARD_HEADERS_STRATEGY: "framework"
  # JVM Optimization (Optimizado para contenedores extremadamente ligeros de 450MB RAM)
  JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=55.0 -XX:+UseSerialGC -XX:MinHeapFreeRatio=10 -XX:MaxHeapFreeRatio=20"

services:

  # ── MICROSERVICIOS Core y Negocio ─────────────────────────────────────────

  ms-usuario:
    <<: *spring-base
    container_name: luka-ms-usuario
    env_file:
      - ../.env.local
    ports:
      - "8081:8081"
    build:
      context: ..
      dockerfile: microservicio-usuario/Dockerfile.local
    environment:
      <<: *env-common
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/db_luka_usuario
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: host.docker.internal
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_DATA_REDIS_SSL_ENABLED: "false"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      LUKA_JWT_CLAVE_SECRETA: ${JWT_SECRET_KEY:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 450M

  ms-cliente:
    <<: *spring-base
    container_name: luka-ms-cliente
    env_file:
      - ../.env.local
    ports:
      - "8083:8083"
    build:
