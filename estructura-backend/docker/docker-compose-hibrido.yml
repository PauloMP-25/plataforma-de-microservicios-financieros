    env_file:
      - ../.env.local
    ports:
      - "8086:8086"
    build:
      context: ..
      dockerfile: microservicio-ia/Dockerfile.local
    networks:
      - luka-network
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-local-dev-gemini-key}
      GEMINI_MODELO: ${GEMINI_MODELO:-gemini-2.0-flash}
      GEMINI_MAX_TOKENS: ${GEMINI_MAX_TOKENS:-1024}
      GEMINI_TEMPERATURA: ${GEMINI_TEMPERATURA:-0.7}
      SPRING_PROFILES_ACTIVE: local
      EUREKA_CLIENT_ENABLED: "false"
      REDIS_HOST: host.docker.internal
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_SSL: "false"
      RABBITMQ_HOST: host.docker.internal
      RABBITMQ_PUERTO: 5672
      RABBITMQ_USUARIO: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      JWT_CLAVE_SECRETA: ${JWT_SECRET_KEY:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_USUARIO: postgres
      DB_NOMBRE: db_luka_ia
      DB_NAME_IA: db_luka_ia
      SPRING_DATASOURCE_NAME: db_luka_ia
      SPRING_DATASOURCE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@host.docker.internal:5432/db_luka_ia
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 450M

  ms-auditoria:
    <<: *spring-base
    container_name: luka-ms-auditoria
