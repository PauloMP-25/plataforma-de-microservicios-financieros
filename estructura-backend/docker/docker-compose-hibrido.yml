networks:
  luka-network:
    driver: bridge
    name: luka-hibrido
x-spring-base:
  restart: unless-stopped
  networks: &id001
  - luka-network
x-env-common:
  SPRING_PROFILES_ACTIVE: docker
  SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: 'true'
  SPRING_RABBITMQ_HOST: host.docker.internal
  SPRING_RABBITMQ_PORT: 5672
  SPRING_RABBITMQ_USERNAME: guest
  SPRING_RABBITMQ_PASSWORD: guest
  SPRING_RABBITMQ_VIRTUAL_HOST: /
  JAVA_OPTS: -Xms64m -Xmx200m -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC
    -XX:+TieredCompilation -XX:TieredStopAtLevel=1
services:
  ms-usuario:
    restart: unless-stopped
    networks: *id001
    container_name: luka-ms-usuario
    env_file:
    - ../.env.local
    ports:
    - 8081:8081
    build:
      context: ..
      dockerfile: microservicio-usuario/Dockerfile.local
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: 'true'
      SPRING_RABBITMQ_HOST: host.docker.internal
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABBITMQ_PASSWORD: guest
      SPRING_RABBITMQ_VIRTUAL_HOST: /
      JAVA_OPTS: -Xms64m -Xmx200m -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0
        -XX:+UseG1GC -XX:+TieredCompilation -XX:TieredStopAtLevel=1
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal/db_microservicio_usuario?sslmode=disable
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: adminUTP
      SPRING_DATA_REDIS_HOST: host.docker.internal
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ''
      SPRING_DATA_REDIS_SSL_ENABLED: 'false'
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      URL_PROD_CLIENTE: http://ms-cliente:8083
      URL_PROD_MENSAJERIA: http://ms-mensajeria:8084
    deploy:
      resources:
        limits:
          memory: 512M
    extra_hosts:
    - host.docker.internal:host-gateway
  ms-cliente:
    restart: unless-stopped
    networks: *id001
    container_name: luka-ms-cliente
