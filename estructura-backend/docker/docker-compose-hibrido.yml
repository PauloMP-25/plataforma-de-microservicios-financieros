# 🛡️ LUKA APP — docker-compose-hibrido.yml (v2.0 - Fully Parameterized)
# Optimizado para ahorro de RAM y conexión híbrida Cloud/Local

networks:
  luka-network:
    driver: bridge
    name: luka-hibrido

x-spring-base: &spring-base
  restart: unless-stopped
  networks:
    - luka-network

x-env-common: &env-common
  SPRING_PROFILES_ACTIVE: docker
  SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
  # RabbitMQ (Local Windows)
  SPRING_RABBITMQ_HOST: host.docker.internal
  SPRING_RABBITMQ_PORT: 5672
  SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER}
  SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
  SPRING_RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_VHOST}
  # Eureka
  EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE: http://${EUREKA_USER}:${EUREKA_PASSWORD}@eureka-server:8761/eureka
  # JVM Optimization
  JAVA_OPTS: "-Xms128m -Xmx384m -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"

services:

  eureka-server:
    <<: *spring-base
    container_name: luka-eureka
    build:
      context: ../infraestructura/eureka-server
    ports:
      - "${EUREKA_DASHBOARD_PORT:-8761}:8761"
    environment:
      <<: *env-common
    healthcheck:
      test: ["CMD", "curl", "-f", "-u", "${EUREKA_USER}:${EUREKA_PASSWORD}", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 450M

  ms-usuario:
    <<: *spring-base
    container_name: luka-ms-usuario
    build:
      context: ..
      dockerfile: microservicio-usuario/Dockerfile
    environment:
      <<: *env-common
      SPRING_DATASOURCE_URL: jdbc:postgresql://${NEON_HOST}/db_microservicio_usuario?sslmode=require
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_DATA_REDIS_SSL_ENABLED: "true"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on:
      - eureka-server
    deploy:
      resources:
        limits:
          memory: 450M

  ms-cliente:
    <<: *spring-base
    container_name: luka-ms-cliente
    build:
      context: ..
      dockerfile: microservicio-cliente/Dockerfile
    environment:
      <<: *env-common
      SPRING_DATASOURCE_URL: jdbc:postgresql://${NEON_HOST}/db_microservicio_cliente?sslmode=require
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on:
      - eureka-server
    deploy:
      resources:
        limits:
          memory: 450M

  ms-mensajeria:
    <<: *spring-base
    container_name: luka-ms-mensajeria
    build:
      context: ..
      dockerfile: microservicio-mensajeria/Dockerfile
    environment:
      <<: *env-common
      SPRING_DATASOURCE_URL: jdbc:postgresql://${NEON_HOST}/db_microservicio_mensajeria?sslmode=require
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on:
      - eureka-server
    deploy:
      resources:
        limits:
          memory: 450M

  ms-ia:
    container_name: luka-ms-ia
    build:
      context: ../microservicio-ia
    networks:
      - luka-network
    environment:
      EUREKA_SERVIDOR_URL: http://${EUREKA_USER}:${EUREKA_PASSWORD}@eureka-server:8761/eureka
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_SSL: "true"
      RABBITMQ_HOST: host.docker.internal
      RABBITMQ_PUERTO: 5672
      RABBITMQ_USUARIO: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
      JWT_CLAVE_SECRETA: ${JWT_SECRET_KEY}
      # Neon para persistencia IA
      DB_HOST: ${NEON_HOST}
      DB_PORT: 5432
      DB_USUARIO: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NOMBRE: db_microservicio_ia
    deploy:
      resources:
        limits:
          memory: 600M

  ms-auditoria:
    <<: *spring-base
    container_name: luka-ms-auditoria
    build:
      context: ..
      dockerfile: microservicio-auditoria/Dockerfile
    environment:
      <<: *env-common
      SPRING_DATASOURCE_URL: jdbc:postgresql://${NEON_HOST}/db_microservicio_auditoria?sslmode=require
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on:
      - eureka-server
    deploy:
      resources:
        limits:
          memory: 450M

  ms-nucleo-financiero:
    <<: *spring-base
    container_name: luka-ms-nucleo-financiero
    build:
      context: ..
      dockerfile: microservicio-nucleo-financiero/Dockerfile
    environment:
      <<: *env-common
      SPRING_DATASOURCE_URL: jdbc:postgresql://${NEON_HOST}/db_microservicio_financiero?sslmode=require
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on:
      - eureka-server
    deploy:
      resources:
        limits:
          memory: 450M

  api-gateway:
    <<: *spring-base
    container_name: luka-gateway
    build:
      context: ..
      dockerfile: infraestructura/api-gateway/Dockerfile
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      <<: *env-common
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_SSL_ENABLED: "true"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on:
      - eureka-server
    deploy:
      resources:
        limits:
          memory: 450M
