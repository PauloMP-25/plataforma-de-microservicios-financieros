# 🛡️ LUKA APP — docker-compose-hibrido.yml (v4.0 - 100% LOCAL)
# Optimizado para entorno local: microservicios en Docker + PostgreSQL en host

networks:
  luka-network:
    driver: bridge
    name: luka-hibrido

x-spring-base: &spring-base
  restart: unless-stopped
  networks:
    - luka-network

x-env-common: &env-common
  SPRING_PROFILES_ACTIVE: local
  SPRING_MAIN_ALLOW_BEAN_DEFINITION_OVERRIDING: "true"
  # RabbitMQ (Interno en Docker) - Forzado a guest en entorno local
  SPRING_RABBITMQ_HOST: rabbitmq
  SPRING_RABBITMQ_PORT: 5672
  SPRING_RABBITMQ_USERNAME: guest
  SPRING_RABBITMQ_PASSWORD: guest
  SPRING_RABBITMQ_VIRTUAL_HOST: /
  # Eureka deshabilitado por estándar local del repositorio
  EUREKA_CLIENT_ENABLED: "false"
  SPRING_CLOUD_DISCOVERY_ENABLED: "false"
  # Actuator local: exponer endpoints básicos y evitar que dependencias opcionales marquen DOWN
  MANAGEMENT_ENDPOINTS_WEB_BASE_PATH: /actuator
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics,gateway
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: always
  MANAGEMENT_HEALTH_REDIS_ENABLED: "false"
  MANAGEMENT_HEALTH_DISCOVERY_ENABLED: "false"
  # JVM Optimization (Consumo mínimo de recursos)
  JAVA_OPTS: "-Xms128m -Xmx384m -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"

services:

  # ── INFRAESTRUCTURA LOCAL (Caché y Mensajería) ─────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: luka-rabbitmq
    hostname: rabbitmq
    restart: unless-stopped
    networks:
      - luka-network
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    # Se remueve el límite de memoria estricto para evitar que RabbitMQ se quede colgado al iniciar

  redis:
    image: redis:7-alpine
    container_name: luka-redis
    hostname: redis
    restart: unless-stopped
    networks:
      - luka-network
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 150M

  # ── MICROSERVICIOS ─────────────────────────────────────────────────────────

  ms-usuario:
    <<: *spring-base
    container_name: luka-ms-usuario
    env_file:
      - ../.env
    ports:
      - "8081:8081"
    build:
      context: ..
      dockerfile: microservicio-usuario/Dockerfile.local
    environment:
      <<: *env-common
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 12345
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/db_luka_usuario
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 12345
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_DATA_REDIS_SSL_ENABLED: "false"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      LUKA_JWT_CLAVE_SECRETA: ${JWT_SECRET_KEY:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    depends_on:
      - redis
      - rabbitmq
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 450M

  ms-cliente:
    <<: *spring-base
    container_name: luka-ms-cliente
    ports:
      - "8083:8083"
    build:
      context: ..
      dockerfile: microservicio-cliente/Dockerfile.local
    environment:
      <<: *env-common
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 12345
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/db_luka_cliente
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 12345
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_PHONE_ID: ${WHATSAPP_PHONE_ID}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION}
    depends_on:
      - rabbitmq
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 450M

  ms-mensajeria:
    <<: *spring-base
    container_name: luka-ms-mensajeria
    ports:
      - "8084:8084"
    build:
      context: ..
      dockerfile: microservicio-mensajeria/Dockerfile.local
    environment:
      <<: *env-common
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 12345
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/db_luka_mensajeria
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 12345
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      GMAIL_USER: ${GMAIL_USER}
      GMAIL_PASSWORD: ${GMAIL_PASSWORD}
    depends_on:
      - rabbitmq
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 450M

  ms-ia:
    container_name: luka-ms-ia
    ports:
      - "8086:8086"
    build:
      context: ..
      dockerfile: microservicio-ia/Dockerfile.local
    networks:
      - luka-network
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-local-dev-gemini-key}
      GEMINI_MODELO: ${GEMINI_MODELO:-gemini-2.0-flash}
      GEMINI_MAX_TOKENS: ${GEMINI_MAX_TOKENS:-1024}
      GEMINI_TEMPERATURA: ${GEMINI_TEMPERATURA:-0.7}
      SPRING_PROFILES_ACTIVE: local
      EUREKA_CLIENT_ENABLED: "false"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_SSL: "false"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PUERTO: 5672
      RABBITMQ_USUARIO: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_VHOST: /
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      JWT_CLAVE_SECRETA: ${JWT_SECRET_KEY:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      # PostgreSQL local (host)
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 12345
      DB_USUARIO: postgres
      DB_NOMBRE: db_luka_ia
      DB_NAME_IA: db_luka_ia
      SPRING_DATASOURCE_NAME: db_luka_ia
      SPRING_DATASOURCE_URL: postgresql://postgres:12345@host.docker.internal:5432/db_luka_ia
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 12345
    depends_on:
      - redis
      - rabbitmq
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 600M

  ms-auditoria:
    <<: *spring-base
    container_name: luka-ms-auditoria
    ports:
      - "8082:8082"
    build:
      context: ..
      dockerfile: microservicio-auditoria/Dockerfile.local
    environment:
      <<: *env-common
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 12345
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/db_luka_auditoria
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 12345
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    depends_on:
      - rabbitmq
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 450M

  ms-nucleo-financiero:
    <<: *spring-base
    container_name: luka-ms-nucleo-financiero
    ports:
      - "8085:8085"
    build:
      context: ..
      dockerfile: microservicio-nucleo-financiero/Dockerfile.local
    environment:
      <<: *env-common
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 12345
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/db_luka_financiero
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 12345
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN}
      WHATSAPP_PHONE_ID: ${WHATSAPP_PHONE_ID}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION}
    depends_on:
      - rabbitmq
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 450M

  ms-pagos:
    <<: *spring-base
    container_name: luka-ms-pago
    ports:
      - "8087:8087"
    build:
      context: ..
      dockerfile: microservicio-pago/Dockerfile.local
    environment:
      <<: *env-common
      SERVER_PORT: 8087
      DB_HOST: host.docker.internal
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: 12345
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:5432/db_luka_pagos
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 12345
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_local_dev_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_local_dev_placeholder}
    depends_on:
      - rabbitmq
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          memory: 450M

  api-gateway:
    <<: *spring-base
    container_name: luka-gateway
    build:
      context: ..
      dockerfile: infraestructura/api-gateway/Dockerfile.local
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      <<: *env-common
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_SSL_ENABLED: "false"
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # Forzamos apagar el SSL del application-docker.yml inyectando la propiedad de Spring
      SPRING_DATA_REDIS_SSL_ENABLED: "false"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      # Redirigir el trafico del gateway hacia los contenedores locales (y evitar Render)
      URL_PROD_USUARIO: http://ms-usuario:8081
      URL_PROD_CLIENTE: http://ms-cliente:8083
      URL_PROD_AUDITORIA: http://ms-auditoria:8082
      URL_PROD_FINANCIERO: http://ms-nucleo-financiero:8085
      URL_PROD_MENSAJERIA: http://ms-mensajeria:8084
      URL_PROD_IA: http://ms-ia:8086
      URL_PROD_PAGO: http://ms-pagos:8087
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 450M
