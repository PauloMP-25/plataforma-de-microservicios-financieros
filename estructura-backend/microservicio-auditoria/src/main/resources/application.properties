# ============================================
# CARGAR VARIABLES DE ENTORNO DEL .ENV GLOBAL
# ============================================
spring.config.import=optional:file:../.env[.properties]

# ============================================
# NOMBRE DEL MICROSERVICIO
# ============================================
spring.application.name=microservicio-auditoria
spring.profiles.active=local

# ============================================
# SERVIDOR
# ============================================
server.port=8082

# Configuración de Actuator (Evita conflictos de salud de RabbitMQ detectados en el despliegue)
management.health.rabbit.enabled=false
spring.main.allow-bean-definition-overriding=true

# ============================================
# CONFIGURACIÓN DE REDIS (CACHÉ)
# ============================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=true

# ============================================
# BASE DE DATOS - POSTGRESQL
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/db_luka_auditoria
spring.datasource.username=postgres
spring.datasource.password=adminUTP
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ============================================
# LÓGICA DE SEGURIDAD - DETECCIÓN DE FUERZA BRUTA
# ============================================
# Número de fallos consecutivos antes de bloquear la IP
auditoria.seguridad.max-intentos-fallidos=3
# Ventana de tiempo (minutos) para contar los intentos fallidos
auditoria.seguridad.ventana-minutos=10
# Duración del bloqueo automático (minutos)
auditoria.seguridad.bloqueo-minutos=30

# ============================================================
# RABBITMQ — Configuración de Conexión
# ============================================================
spring.rabbitmq.connection-name=${spring.application.name}
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}
 
# Virtual host: permite aislar entornos (dev/staging/prod) en el mismo broker
spring.rabbitmq.virtual-host=${SPRING_RABBITMQ_VIRTUAL_HOST:/}
 
# ── Pool de conexiones ────────────────────────────────────────────────────────
# Número de canales por conexión (default: 25)
spring.rabbitmq.cache.channel.size=10
# Tiempo de espera para obtener un canal del pool (ms)
spring.rabbitmq.cache.channel.checkout-timeout=1000
 
# ── Timeouts de conexión ──────────────────────────────────────────────────────
# Tiempo máximo para establecer conexión con el broker (ms)
spring.rabbitmq.connection-timeout=10000
spring.rabbitmq.listener.simple.auto-startup=true
 
# ── Confirmaciones del publicador (Publisher Confirms) ────────────────────────
# CORRELATED: Spring espera confirmación del broker por cada mensaje enviado.
# Garantiza que el mensaje llegó al exchange (no a la cola).
# Activar solo si se necesita garantía fuerte de entrega en el publicador.
spring.rabbitmq.publisher-confirm-type=correlated
 
# Publisher Returns: notifica si el mensaje no fue enrutado a ninguna cola.
# Útil para detectar errores de configuración en los bindings.
spring.rabbitmq.publisher-returns=true
 
# ── Reconexión automática ─────────────────────────────────────────────────────
# Spring AMQP reintenta la conexión automáticamente si el broker se cae.
# Los valores definen el backoff exponencial entre intentos.
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.max-interval=10000
spring.rabbitmq.listener.simple.retry.multiplier=2.0
 
# ── Acknowledgement ───────────────────────────────────────────────────────────
# AUTO: Spring confirma automáticamente si el método listener no lanza excepción.
# Si lanza RuntimeException → reencola. Si lanza AmqpRejectAndDontRequeue → DLQ.
spring.rabbitmq.listener.simple.acknowledge-mode=manual
 
# Número máximo de mensajes prefetch por consumidor.
# 1 = procesar un mensaje a la vez (más justo entre consumidores concurrentes)
spring.rabbitmq.listener.simple.prefetch=1
 
# ── Concurrencia de consumidores ──────────────────────────────────────────────
# min-concurrency: hilos mínimos por listener (uno por cola)
# max-concurrency: escala automáticamente bajo alta carga
spring.rabbitmq.listener.simple.concurrency=1
spring.rabbitmq.listener.simple.max-concurrency=3
 
# ── Management UI (opcional, solo en desarrollo) ──────────────────────────────
# Puerto de la consola web de RabbitMQ: http://localhost:15672
# Usuario y contraseña son los mismos de spring.rabbitmq.username/password
 
# ============================================================
# SCHEDULING — Necesario para @Scheduled en el servicio
# ============================================================
spring.task.scheduling.pool.size=2

# ============================================
# SEGURIDAD Y JWT (ESTANDARIZADO LUKA)
# ============================================
luka.jwt.clave-secreta=${JWT_SECRET_KEY:}
application.security.jwt.expiration=86400000

# ============================================
# LOGGING
# ============================================
logging.level.root=INFO
logging.level.com.auditoria=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=INFO
logging.level.org.springframework.transaction=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.amqp=WARN
logging.level.org.springframework.amqp.rabbit=WARN
logging.level.org.springframework.boot.actuate=WARN
# Formato logs más corto
logging.pattern.console=%d{HH:mm:ss} %-5p - %msg%n
logging.file.name=logs/microservicio-auditoria.log

# Redireccion de Actuator Health para usar ControladorSaludCustom de libreria-comun
management.endpoints.web.path-mapping.health=health-internal
