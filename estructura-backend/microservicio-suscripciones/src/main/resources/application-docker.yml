# ═══════════════════════════════════════════════════════════════════════════════
#  LUKA APP — application-docker.yml (ms-suscripciones)
# ═══════════════════════════════════════════════════════════════════════════════

spring:
  config:
    import: optional:file:../.env[.properties]
  application:
    name: ms-suscripciones

  # ── Base de datos ────────────────────────────────────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/db_microservicio_suscripciones}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 30000

  # ── JPA / Hibernate ──────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        show_sql: false
    open-in-view: false

  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:rabbitmq}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
    virtual-host: ${SPRING_RABBITMQ_VIRTUAL_HOST:/}
    connection-name: ${spring.application.name}
    connection-timeout: 10000
    listener:
      simple:
        auto-startup: true

server:
  port: 8088

# ── Actuator ───────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      path-mapping:
        health: health-internal
  endpoint:
    health:
      show-details: always

# ── Seguridad JWT (Configuración Luka) ─────────────────────────────────────────
luka:
  jwt:
    clave-secreta: ${JWT_SECRET_KEY:}
    expiracion-ms: 86400000

# ── Logging ────────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.suscripciones: DEBUG
    org.springframework.security: WARN
    org.springframework.transaction: INFO
    org.springframework.web: INFO
    org.springframework.amqp: WARN
    org.springframework.boot.actuate: WARN
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
