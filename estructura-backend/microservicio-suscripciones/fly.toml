app = "luka-ms-suscripciones"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8088"
  JAVA_TOOL_OPTIONS = "-XX:+UseContainerSupport -Xmx150m -Xss256k -XX:CICompilerCount=2"

[http_service]
  internal_port = 8088
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]
