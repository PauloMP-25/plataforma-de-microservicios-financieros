# ============================================
# NOMBRES DEL MICROSERVICIO
# ============================================
spring.application.name=microservicio-usuario

# ============================================
# SERVIDOR
# ============================================
server.port=8081

# ============================================================
# RABBITMQ — Configuración de Conexión
# ============================================================
# En producción, reemplazar con variables de entorno:
#   RABBITMQ_HOST, RABBITMQ_PORT, RABBITMQ_USER, RABBITMQ_PASS
spring.rabbitmq.connection-name=${spring.application.name}
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

# ============================================
# CREDENCIALES Y DIRECCION DEL SERVIDOR EUREKA
# ============================================
eureka.client.service-url.defaultZone=http://admin:admin123@localhost:8761/eureka/
# ============================================
# CCONFIGURACION DE REGISTRO AL SERVIDOR EUREKA
# ============================================
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
# =====================================================================
# Optimización para que el dashboard se actualice rápido en desarrollo
# =====================================================================
# Envía una señal de "estoy vivo" cada 10 segundos (por defecto son 30)
eureka.instance.lease-renewal-interval-in-seconds=10
# Si el servidor no recibe señal en 20 segundos, considera al servicio muerto
eureka.instance.lease-expiration-duration-in-seconds=20
# Id único para evitar conflictos si lanzas varias instancias
eureka.instance.instance-id=${spring.application.name}:${server.port}:${random.value}
# ============================================
# COMUNICACIÓN ENTRE MICROSERVICIOS
# (Nota: En el futuro usaremos el nombre de Eureka aquí)
# ============================================
microservicio.cliente.url=http://localhost:8083

# Habilitar Circuit Breaker para Feign
spring.cloud.openfeign.circuitbreaker.enabled=true

# Opcional: Configurar tiempos de espera para que no tarde mucho en fallar
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=5s

# ============================================
# BASE DE DATOS - POSTGRESQL
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/db_microservicio_usuario
spring.datasource.username=postgres
spring.datasource.password=adminUTP
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ============================================
# SEGURIDAD Y JWT (ESTANDARIZADO LUKA)
# ============================================
luka.jwt.clave-secreta=${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
application.security.jwt.expiration=86400000

# ============================================
# DOCUMENTACION
# ============================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
# Esto ayuda si hay problemas con los modelos
springdoc.writer-with-default-pretty-printer=true
# ============================================
# LOGGING (OPTIMIZADO)
# ============================================
logging.level.root=INFO
# Tu proyecto
logging.level.com.usuario=DEBUG
# Seguridad
logging.level.org.springframework.security=DEBUG
# JPA
logging.level.org.hibernate.SQL=DEBUG
# Transacciones
logging.level.org.springframework.transaction=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.amqp.rabbit=DEBUG
# Formato logs
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
# Archivo de logs
logging.file.name=logs/microservicio-usuario.log
