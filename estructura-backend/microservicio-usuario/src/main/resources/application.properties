# ============================================
# CARGAR VARIABLES DE ENTORNO DEL .ENV GLOBAL
# ============================================
spring.config.import=optional:file:../.env[.properties]

# ============================================
# NOMBRES DEL MICROSERVICIO
# ============================================
spring.application.name=microservicio-usuario
spring.profiles.active=local

# ============================================
# SERVIDOR
# ============================================
server.port=8081

# ============================================
# CONFIGURACIÓN DE REDIS (CACHÉ)
# ============================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=true

# ============================================
# BASE DE DATOS - POSTGRESQL
# ============================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:db_luka_usuario}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:adminUTP}
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
# ============================================================
# RABBITMQ — Configuración de Conexión
# ============================================================
spring.rabbitmq.connection-name=${spring.application.name}
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}
spring.rabbitmq.virtual-host=${SPRING_RABBITMQ_VIRTUAL_HOST:/}
spring.rabbitmq.connection-timeout=10000
spring.rabbitmq.listener.simple.auto-startup=true

# ============================================
# COMUNICACIÓN ENTRE MICROSERVICIOS (URLs estáticas)
# ============================================
microservicio.cliente.url=http://localhost:8083

# Habilitar Circuit Breaker para Feign
spring.cloud.openfeign.circuitbreaker.enabled=true

# Opcional: Configurar tiempos de espera para que no tarde mucho en fallar
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=5s

# Aumentar tiempo de espera de Feign/Resilience4j para evitar Timeout de 1s
resilience4j.timelimiter.configs.default.timeoutDuration=30s
resilience4j.timelimiter.instances.default.timeoutDuration=30s
# ============================================
# SEGURIDAD Y JWT (ESTANDARIZADO LUKA)
# ============================================
luka.jwt.clave-secreta=${JWT_SECRET_KEY:}
luka.jwt.expiracion-ms=${JWT_EXPIRATION:86400000}


# ============================================
# DOCUMENTACION
# ============================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
# Esto ayuda si hay problemas con los modelos
springdoc.writer-with-default-pretty-printer=true
# ============================================
# LOGGING (OPTIMIZADO)
# ============================================
logging.level.root=INFO
logging.level.com.usuario=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR
logging.level.org.hibernate.SQL=INFO
logging.level.org.springframework.transaction=INFO
logging.level.org.springframework.amqp=WARN
logging.level.org.springframework.amqp.rabbit=WARN
logging.level.org.springframework.boot.actuate=WARN
# Formato logs más corto
logging.pattern.console=%d{HH:mm:ss} %-5p [%X{correlationId:-NoID}] - %msg%n
# Archivo de logs
logging.file.name=logs/microservicio-usuario.log

# Redireccion de Actuator Health para usar ControladorSaludCustom de libreria-comun
management.endpoints.web.path-mapping.health=health-internal
